# ESPresence One entry for each beacon you want to track
- platform: mqtt_room
  device_id: "known:6afe09508f42"
  state_topic: "espresense/devices/known:6afe09508f42"
  timeout: 10
  away_timeout: 120 # number of seconds after which the enitity will get status not_ho


# Work location statistics - 4 weeks (count of state changes, updated every 30 min)
- platform: history_stats
  name: WFH Days Last 4 Weeks
  entity_id: binary_sensor.working_from_home
  state: 'on'
  type: count
  duration:
    days: 28
  end: "{{ now() }}"
  scan_interval: 1800
- platform: history_stats
  name: Office Days Last 4 Weeks
  entity_id: binary_sensor.working_at_office
  state: 'on'
  type: count
  duration:
    days: 28
  end: "{{ now() }}"
  scan_interval: 1800

# Daily work location hours (lightweight 1-day lookback, feeds utility meters)
- platform: history_stats
  name: WFH Hours Today
  entity_id: binary_sensor.working_from_home
  state: 'on'
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
  end: "{{ now() }}"
- platform: history_stats
  name: Office Hours Today
  entity_id: binary_sensor.working_at_office
  state: 'on'
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
  end: "{{ now() }}"

