# ============================================================================
# Thermal Comfort Sensor Offsets
# ============================================================================
# Per-room temperature offsets applied to the raw sensor before feeding
# into the Thermal Comfort integration. Negative values shift the comfort
# zone warmer (heat triggers sooner, cooling triggers later).
#
# Science: each -1°C offset shifts SSI by -1.61°C at typical indoor humidity.
# The comfortable → cool threshold is at SSI 21.1°C.
# Rule of thumb: -2°C offset shifts heat-on from ~18.6°C to ~20.6°C actual.
# Tune via Lovelace to match felt comfort. Default 0.0 (no offset) for all rooms.
masterbed_temperature_offset:
  name: Master Bedroom Temperature Offset (Thermal Comfort)
  min: -5
  max: 5
  step: 0.5
  initial: 0.0
  unit_of_measurement: "°C"
  icon: mdi:thermometer-plus
living_room_temperature_offset:
  name: Living Room Temperature Offset (Thermal Comfort)
  min: -5
  max: 5
  step: 0.5
  initial: 0.5
  unit_of_measurement: "°C"
  icon: mdi:thermometer-plus
kids_room_temperature_offset:
  name: Kids Room Temperature Offset (Thermal Comfort)
  min: -5
  max: 5
  step: 0.5
  initial: 0.0
  unit_of_measurement: "°C"
  icon: mdi:thermometer-plus

# Indoor Thermal Comfort (ASHRAE 55) — human-factor helpers
# clothing_insulation: shared by master bedroom, living room, study, rumpus
#   (all on adult schedule — switches at master bedroom bed/wake times)
# clothing_insulation_kids: kids room only
#   (switches at kids bed/wake times — earlier bedtime than adults)
# metabolic_rate: shared by all rooms (1.0 day / 0.8 sleeping, follows adult schedule)
metabolic_rate:
  name: Metabolic Rate
  min: 0.8
  max: 2.0
  step: 0.1
  initial: 1.0
  unit_of_measurement: met
  icon: mdi:run
  mode: slider
clothing_insulation:
  name: Clothing Insulation
  min: 0.0
  max: 1.5
  step: 0.1
  initial: 0.7
  unit_of_measurement: clo
  icon: mdi:tshirt-crew
  mode: slider
clothing_insulation_kids:
  name: Clothing Insulation (Kids Room)
  min: 0.0
  max: 1.5
  step: 0.1
  initial: 0.7
  unit_of_measurement: clo
  icon: mdi:tshirt-crew
  mode: slider
clothing_index_sleeping:
  name: Clothing Index (Sleeping)
  min: 0.0
  max: 1.5
  step: 0.1
  initial: 1.5
  unit_of_measurement: clo
  icon: mdi:bed
  mode: slider

