---
- id: '1681557115756'
  alias: Alarmo - Follow Occupancy Modes
  description: Arms or disarms Alarmo to mirror the current occupancy setting.
  trigger:
  - platform: state
    entity_id:
    - input_select.occupancy
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.occupancy
        state: Away
      sequence:
      - action: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.alarmo
    - conditions:
      - condition: state
        entity_id: input_select.occupancy
        state: Home
      sequence:
      - action: alarm_control_panel.alarm_disarm
        target:
          entity_id: alarm_control_panel.alarmo
    - conditions:
      - condition: state
        entity_id: input_select.occupancy
        state: Sleeping
      sequence:
      - action: alarm_control_panel.alarm_arm_night
        target:
          entity_id: alarm_control_panel.alarmo
  mode: single
- id: '1681731859692'
  alias: Alarmo - Arm Night Routine
  description: Arms Alarmo in night mode during bedtime hours based on occupancy or
    manual triggers.
  triggers:
  - at: '21:00:00'
    id: fallback_time
    enabled: false
    trigger: time
  - entity_id:
    - input_select.occupancy
    from: Home
    id: occupancy_sleeping
    to: Sleeping
    trigger: state
  - at: input_datetime.bedtime_master_bedroom
    id: bedtime_time
    trigger: time
  - trigger: numeric_state
    id: sleep_confidence
    entity_id: sensor.samsung_galaxy_s22_ultra_sleep_confidence
    above: 95
    for:
      minutes: 10
  conditions:
  - condition: time
    before: 06:00:00
    weekday:
    - mon
    - sun
    - tue
    - wed
    - thu
    - fri
    - sat
    after: '19:00:00'
  - condition: not
    conditions:
    - condition: state
      entity_id: alarm_control_panel.alarmo
      state: armed_night
  - condition: or
    conditions:
    - condition: not
      conditions:
      - condition: trigger
        id: sleep_confidence
    - condition: time
      before: 01:00:00
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.occupancy
        state: Away
      sequence:
      - wait_for_trigger:
        - entity_id:
          - input_select.occupancy
          from: Away
          to: Home
          for:
            hours: 4
            minutes: 0
            seconds: 0
          trigger: state
        continue_on_timeout: false
      - action: alarm_control_panel.alarm_arm_night
        target:
          entity_id: alarm_control_panel.alarmo
    - conditions:
      - condition: state
        entity_id: input_select.occupancy
        state: Home
      sequence:
      - action: alarm_control_panel.alarm_arm_night
        target:
          entity_id: alarm_control_panel.alarmo
    - conditions:
      - condition: state
        entity_id: input_select.occupancy
        state: Holiday
      sequence:
      - stop: Not required. Alarm already set.
    - conditions:
      - condition: state
        entity_id: input_select.occupancy
        state: Sleeping
      sequence:
      - action: alarm_control_panel.alarm_arm_night
        target:
          entity_id: alarm_control_panel.alarmo
    default:
    - action: alarm_control_panel.alarm_arm_night
      target:
        entity_id: alarm_control_panel.alarmo
  - choose:
    - conditions:
      - condition: not
        conditions:
        - condition: trigger
          id: occupancy_sleeping
      sequence:
      - action: notify.mobile_app_samsung_galaxy_s22_ultra
        data:
          message: Alarmo Armed
  - data:
      message: Home has detected youre not at home. Are you coming home?
      title: 'Action: are you coming home tonight?'
    enabled: false
    service: notify.mobile_app_samsung_galaxy_s22_ultra
  mode: single
- id: '1716152338300'
  alias: Alarmo - Disarm When Household Awake
  description: Disarms Alarmo when someone wakes up during the early-morning routine.
  trigger:
  - trigger: numeric_state
    id: sleep_confidence
    entity_id: sensor.samsung_galaxy_s22_ultra_sleep_confidence
    below: 80
    for:
      minutes: 10
  - trigger: numeric_state
    id: floors_descended
    entity_id: sensor.slvdh_floors_descended
    above: 1
  - platform: time
    id: morning_failsafe
    at: 07:00:00
  condition:
  - condition: state
    entity_id: binary_sensor.someone_home
    state: 'on'
    alias: Someone Home
  - condition: time
    after: 05:00:00
    before: 09:00:00
  - condition: state
    entity_id: alarm_control_panel.alarmo
    state: armed_night
  action:
  - service: alarmo.disarm
    metadata: {}
    data:
      entity_id: alarm_control_panel.alarmo
  mode: single
- id: '1684787591500'
  alias: Alarmo Arming Prompt
  description: Sends an actionable notification to choose an Alarmo arming mode when
    prompted.
  trigger:
  - platform: state
    entity_id: input_boolean.alarmo_actionable_notification
    to: 'on'
  action:
  - action: notify.mobile_app_samsung_galaxy_s22_ultra
    data:
      title: Alarm Setup
      message: Choose an arming mode
      data:
        actions:
        - action: ALARM_AWAY
          title: Away
        - action: ALARM_NIGHT
          title: Night
        - action: ALARM_DISARM
          title: Disarm
  - wait_for_trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: ALARM_AWAY
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: ALARM_NIGHT
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: ALARM_DISARM
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ wait.trigger.event.data.action == 'ALARM_AWAY' }}"
      sequence:
      - action: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.alarmo
    - conditions:
      - condition: template
        value_template: "{{ wait.trigger.event.data.action == 'ALARM_NIGHT' }}"
      sequence:
      - action: alarm_control_panel.alarm_arm_night
        target:
          entity_id: alarm_control_panel.alarmo
    - conditions:
      - condition: template
        value_template: "{{ wait.trigger.event.data.action == 'ALARM_DISARM' }}"
      sequence:
      - action: alarm_control_panel.alarm_disarm
        target:
          entity_id: alarm_control_panel.alarmo
  mode: single
# --------------------------------------------------------------------------
# Bedtime security checklist
# --------------------------------------------------------------------------
# Fires 45 minutes after occupancy switches to Sleeping. Only sends a
# notification when something needs attention. If the garage door is open
# the notification includes an actionable button to close it.
# --------------------------------------------------------------------------
- id: bedtime_security_checklist
  alias: "Night - Bedtime Security Checklist"
  description: >
    Checks doors, garage, HVAC, lights, washing machine, water leaks, and
    alarm state 45 minutes after switching to sleeping mode. Only notifies
    when at least one issue is found.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to: Sleeping
      for:
        minutes: 45
  actions:
    - variables:
        issues: >
          {% set ns = namespace(items=[]) %}
          {% if is_state('binary_sensor.front_door_sensor_opening', 'on') %}
            {% set ns.items = ns.items + ['Front door open'] %}
          {% endif %}
          {% if is_state('binary_sensor.side_garage_door_sensor_magnet_opening', 'on') %}
            {% set ns.items = ns.items + ['Side garage door open'] %}
          {% endif %}
          {% if is_state('binary_sensor.balcony_door_sensor_magnet_opening_2', 'on') %}
            {% set ns.items = ns.items + ['Balcony door open'] %}
          {% endif %}
          {% if is_state('binary_sensor.interior_garage_door_sensor_magnet_opening', 'on') %}
            {% set ns.items = ns.items + ['Interior garage door open'] %}
          {% endif %}
          {% if is_state('cover.smart_garage_door_garage', 'open') %}
            {% set ns.items = ns.items + ['Garage door open'] %}
          {% endif %}
          {% if states('climate.living_room_ac_2') not in ['off', 'unavailable', 'unknown'] %}
            {% set ns.items = ns.items + ['Living room AC still on'] %}
          {% endif %}
          {% if states('climate.study_room_ac') not in ['off', 'unavailable', 'unknown']
             and not is_state('input_boolean.study_occupied', 'on') %}
            {% set ns.items = ns.items + ['Study AC still on'] %}
          {% endif %}
          {% if is_state('light.lounge', 'on') %}
            {% set ns.items = ns.items + ['Lounge light on'] %}
          {% endif %}
          {% if is_state('light.floor_lamp_socket_1', 'on') %}
            {% set ns.items = ns.items + ['Floor lamp on'] %}
          {% endif %}
          {% if is_state('light.tv_backlight', 'on') %}
            {% set ns.items = ns.items + ['TV backlight on'] %}
          {% endif %}
          {% if is_state('input_boolean.washing_machine_on', 'off') %}
            {% set changed = states.input_boolean.washing_machine_on.last_changed %}
            {% if changed is defined and changed %}
              {% set ts = as_timestamp(changed) %}
              {% if ts >= as_timestamp(today_at('19:00'))
                 and ts < as_timestamp(today_at('22:00')) %}
                {% set ns.items = ns.items + ['Washing finished - move to dryer'] %}
              {% endif %}
            {% endif %}
          {% endif %}
          {% if is_state('binary_sensor.aqara_water_leak_sensor_water_leak', 'on') %}
            {% set ns.items = ns.items + ['Water leak detected (sensor 1)'] %}
          {% endif %}
          {% if is_state('binary_sensor.aqara_water_leak_sensor_water_leak_2', 'on') %}
            {% set ns.items = ns.items + ['Water leak detected (sensor 2)'] %}
          {% endif %}
          {% if not is_state('alarm_control_panel.alarmo', 'armed_night') %}
            {% set ns.items = ns.items + ['Alarm not in night mode (' ~ states('alarm_control_panel.alarmo') ~ ')'] %}
          {% endif %}
          {{ ns.items }}
        garage_open: "{{ is_state('cover.smart_garage_door_garage', 'open') }}"
    - condition: template
      value_template: "{{ issues | length > 0 }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ garage_open }}"
          sequence:
            - action: notify.mobile_app_samsung_galaxy_s22_ultra
              data:
                title: "Bedtime Checklist"
                message: "{{ issues | join('\n') }}"
                data:
                  actions:
                    - action: CLOSE_GARAGE_BEDTIME
                      title: "Close Garage"
                    - action: DISMISS_BEDTIME_CHECKLIST
                      title: "Dismiss"
      default:
        - action: notify.mobile_app_samsung_galaxy_s22_ultra
          data:
            title: "Bedtime Checklist"
            message: "{{ issues | join('\n') }}"
            data:
              actions:
                - action: DISMISS_BEDTIME_CHECKLIST
                  title: "Dismiss"
  mode: single

# --------------------------------------------------------------------------
# Close garage door from bedtime checklist notification
# --------------------------------------------------------------------------
- id: bedtime_close_garage_from_notification
  alias: "Night - Close Garage from Bedtime Checklist"
  description: >
    Closes the garage door and confirms via notification when the action
    button on the bedtime checklist is tapped.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: CLOSE_GARAGE_BEDTIME
  actions:
    - action: cover.close_cover
      target:
        entity_id: cover.smart_garage_door_garage
    - action: notify.mobile_app_samsung_galaxy_s22_ultra
      data:
        title: "Garage Door"
        message: "Garage door closing."
  mode: single
