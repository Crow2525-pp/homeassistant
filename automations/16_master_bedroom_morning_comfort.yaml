---
# ============================================================================
# MASTER BEDROOM MORNING COMFORT  [SUPERSEDED]
# ============================================================================
# The morning-comfort and morning-comfort-exit automations below are
# SUPERSEDED by 20_time_based_hvac.yaml (master_bedroom_time_based_day /
# master_bedroom_time_based_night). They have been commented out to avoid
# conflicting with those automations.
#
# The humidity dehumidify automation at the bottom of this file is still
# active — it is not duplicated anywhere else.
# ============================================================================

# - id: master_bedroom_morning_comfort
#   alias: "Master Bedroom - Morning Comfort (7:00 AM)"  [SUPERSEDED]
#   Superseded by: HVAC - Master Bedroom - Wake Up Comfort (20_time_based_hvac.yaml)
#   That automation uses input_datetime.wakeup_time_master_bedroom (configurable)
#   and decides heat vs cool using outside temperature + season.

# - id: master_bedroom_morning_comfort_exit
#   alias: "Master Bedroom - Morning Comfort Exit"  [SUPERSEDED]
#   Superseded by: the wake-up automation in 20_time_based_hvac.yaml exits
#   naturally when the bedtime automation fires, or via manual override.

# ============================================================================
# MASTER BEDROOM HUMIDITY CONTROL  [ACTIVE]
# ============================================================================
# Purpose: Maintain humidity below 55% using dehumidification mode
# Behaviour: Activates dry mode when humidity exceeds 55% for 5+ minutes
# ============================================================================

- id: master_bedroom_humidity_dehumidify
  alias: "Master Bedroom - Dehumidify (High Humidity)"
  description: "Activate dry mode when humidity exceeds 55%"
  triggers:
    - trigger: numeric_state
      entity_id: sensor.masterbedroom_masterbed_humidity
      above: 55
      for:
        minutes: 5
      id: high_humidity
  conditions:
    # Only run when home or sleeping
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    # Manual override not active
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.masterbed_room_ac
      data:
        preset_mode: comfort
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.masterbed_room_ac
      data:
        hvac_mode: dry
    - action: logbook.log
      data:
        name: "Master Bedroom Humidity Control"
        message: >
          Dry mode activated - humidity at {{ states('sensor.masterbedroom_masterbed_humidity') }}%
  mode: single
