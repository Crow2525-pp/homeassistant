---
- id: '1681337163617'
  alias: Set Occupancy to Away
  description: Switches the occupancy selector to Away after 10 minutes with no one
    in the home zone.
  triggers:
  - entity_id:
    - zone.home
    to: '0'
    for:
      hours: 0
      minutes: 10
      seconds: 0
    trigger: state
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.occupancy
      state: Away
    - condition: state
      entity_id: input_select.occupancy
      state: Holiday
  actions:
  - data:
      option: Away
    target:
      entity_id: input_select.occupancy
    action: input_select.select_option
  mode: single
- id: '1747620000001'
  alias: Reset Daily Automation Trigger Counters (Midnight)
  description: Resets all daily trigger counters at midnight. Used to track how many
    times each climate automation has triggered throughout the day.
  triggers:
  - at: 00:00:00
    trigger: time
  conditions: []
  actions:
  - action: input_number.set_value
    target:
      entity_id:
      - input_number.seasonal_climate_triggers_today
      - input_number.morning_blinds_triggers_today
      - input_number.preheat_triggers_today
      - input_number.evening_cooling_triggers_today
      - input_number.frost_protection_triggers_today
      - input_number.afternoon_recheck_triggers_today
      - input_number.master_bedroom_cooling_night_triggers_today
      - input_number.children_cooling_night_triggers_today
      - input_number.master_bedroom_blinds_night_triggers_today
      - input_number.master_bedroom_blinds_morning_triggers_today
      - input_number.climate_flags_mark_hot_day_triggers_today
    data:
      value: 0
  mode: single
- id: '1681548980319'
  alias: Set Occupancy to Home
  description: Returns the occupancy selector to Home as soon as either resident arrives.
  trigger:
  - platform: zone
    entity_id: person.stephanie_patterson
    zone: zone.home
    event: enter
  - platform: zone
    entity_id: device_tracker.sm_s908e
    zone: zone.home
    event: enter
  - platform: state
    entity_id:
    - zone.home
    from: '0'
  condition:
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.occupancy
      state: Home
  action:
  - service: input_select.select_option
    data:
      option: Home
    target:
      entity_id: input_select.occupancy
  mode: single
- id: '1735426056624'
  alias: Occupancy - Set Holiday Mode from Alarmo
  description: Sets the occupancy selector to Holiday whenever Alarmo enters the holiday
    state.
  triggers:
  - trigger: state
    entity_id:
    - alarm_control_panel.alarmo
    to: armed_vacation
  conditions: []
  actions:
  - action: input_select.select_option
    metadata: {}
    data:
      option: Holiday
    target:
      entity_id: input_select.occupancy
  mode: single
- id: '1662761539613'
  alias: Reset Occupancy to Home After Wake-Up
  description: Sets the household occupancy back to Home at the configured wake-up
    time while the state is Sleeping.
  trigger:
  - platform: sun
    event: sunrise
    offset: 0
    enabled: false
  - trigger: numeric_state
    entity_id: sensor.samsung_galaxy_s22_ultra_sleep_confidence
    above: 99
    enabled: false
  - platform: time
    at: input_datetime.wakeup_time_master_bedroom
  - platform: state
    entity_id:
    - input_button.wake_up_start
  condition:
  - condition: state
    entity_id: input_select.occupancy
    state: Sleeping
  action:
  - service: input_select.select_option
    data:
      option: Home
    target:
      entity_id: input_select.occupancy
  mode: single

- id: '1735500000001'
  alias: Occupancy - Phil Garmin Home Tracking
  description: Sets occupancy to Home when Phil's Garmin shows he's in the home area
  triggers:
  - trigger: state
    entity_id: sensor.phil_s_garmin_area
    to: home
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.occupancy
      state: Home
  actions:
  - action: input_select.select_option
    data:
      option: Home
    target:
      entity_id: input_select.occupancy
  mode: single

- id: '1743638400001'
  alias: Occupancy - Airport Zone Holiday Prompt
  description: >
    Sends an actionable notification to both phones when either Phil or Steph
    enters the airport zone, asking whether to activate holiday mode.
  triggers:
    - trigger: zone
      entity_id: person.stephanie_patterson
      zone: zone.airport
      event: enter
    - trigger: zone
      entity_id: device_tracker.sm_s908e
      zone: zone.airport
      event: enter
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Holiday
  actions:
    - action: notify.mobile_app_samsung_galaxy_s22_ultra
      data:
        title: "Holiday Mode"
        message: "It looks like you're at the airport. Activate holiday mode?"
        data:
          actions:
            - action: ACTIVATE_HOLIDAY_MODE
              title: "Yes, Holiday Mode"
            - action: DISMISS_HOLIDAY_PROMPT
              title: "No"
    - action: notify.mobile_app_slvdh
      data:
        title: "Holiday Mode"
        message: "It looks like you're at the airport. Activate holiday mode?"
        data:
          actions:
            - action: ACTIVATE_HOLIDAY_MODE
              title: "Yes, Holiday Mode"
            - action: DISMISS_HOLIDAY_PROMPT
              title: "No"
  mode: single

- id: '1743638400002'
  alias: Occupancy - Activate Holiday Mode from Notification
  description: >
    Activates holiday mode when either Phil or Steph taps the actionable
    notification from the airport zone prompt.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: ACTIVATE_HOLIDAY_MODE
  conditions: []
  actions:
    - action: input_select.select_option
      target:
        entity_id: input_select.occupancy
      data:
        option: Holiday
    - action: alarm_control_panel.alarm_arm_vacation
      target:
        entity_id: alarm_control_panel.alarmo
    - action: notify.mobile_app_samsung_galaxy_s22_ultra
      data:
        title: "Holiday Mode Active"
        message: "House is in holiday mode. HVAC, lights, and media will shut down. Have a great trip!"
    - action: notify.mobile_app_slvdh
      data:
        title: "Holiday Mode Active"
        message: "House is in holiday mode. HVAC, lights, and media will shut down. Have a great trip!"
  mode: single

- id: '1735500000002'
  alias: Occupancy - Phil Garmin Away Tracking
  description: Sets occupancy to Away when Phil's Garmin shows he's away from home for 10 minutes and no one else is home
  triggers:
  - trigger: state
    entity_id: sensor.phil_s_garmin_area
    from: home
    for:
      minutes: 10
  conditions:
  - condition: state
    entity_id: input_select.occupancy
    state: Home
  - condition: template
    value_template: "{{ states('sensor.phil_s_garmin_area') != 'home' }}"
  # Only set to Away if no one else is home
  - condition: state
    entity_id: zone.home
    state: '0'
  actions:
  - action: input_select.select_option
    data:
      option: Away
    target:
      entity_id: input_select.occupancy
  mode: single
