# ============================================================================
# HOURLY MODE RE-CHECK
# ============================================================================
# Every hour, if someone is home/sleeping, the AC is already running, and
# manual override is off — re-evaluate heat vs cool based on current indoor
# summer simmer perception. This handles conditions that shift during the day
# (e.g. morning heat-mode switching to cool as the day warms up, or vice versa).
# The preset is NOT changed — only the hvac_mode is updated.
# ============================================================================

- id: living_room_hourly_recheck
  alias: "HVAC - Living Room - Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "0"
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.living_room_ac_2
          state: "off"
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.living_room_thermal_comfort_summer_simmer_perception
              state:
                - cool
                - outside_calculable_range
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: sensor.living_room_thermal_comfort_summer_simmer_perception
              state:
                - slightly_warm
                - increasing_discomfort
                - extremely_warm
                - danger_of_heatstroke
                - extreme_danger_of_heatstroke
                - circulatory_collapse_imminent
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: cool
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
