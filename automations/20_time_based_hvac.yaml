# ============================================================================
# RUMPUS - disabled (running fine without automation)
# Automations are turned off via HA (automation.turn_off) — code kept for
# future re-activation. Do not add enabled: false here; use HA UI or API.
# ============================================================================

- id: rumpus_time_based_day
  alias: "HVAC - Rumpus - Wake Up Comfort"
  description: >
    At wake time, set comfort+cool if warm, or turn off if cold/comfortable.
    climate.rumpus_ac is cool-only — no heat mode available.
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_rumpus
      id: wake_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_rumpus
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.rumpus_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                preset_mode: comfort
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: cool
      default:
        # Cold/Slightly Cool/Neutral — AC can't heat, turn off
        - action: climate.turn_off
          target:
            entity_id: climate.rumpus_ac
  mode: single

- id: rumpus_time_based_night
  alias: "HVAC - Rumpus - Bedtime"
  description: >
    At bedtime, if sleeping and hot: boost+cool. Otherwise turn off.
    climate.rumpus_ac is cool-only — no heat/frost mode available.
  triggers:
    - trigger: time
      at: input_datetime.bedtime_rumpus
