---
# ============================================================================
# TIME-BASED HVAC AUTOMATIONS
# ============================================================================
# This file implements per-room climate control based on wake/bed times.
#
# Logic:
# - Gates: occupancy must be Home or Sleeping
# - Wake/bed time triggers auto-clear manual overrides then proceed
#   (overrides only block half-hourly rechecks, not scheduled transitions)
# - Wake time: comfort preset; heat/cool decided by Indoor Comfort TS (ASHRAE 55)
# - Bed time (bedrooms): always heat or cool — AC stays on all night
#     Cold / Cool → frost+heat; everything else → boost+cool (favor cooling)
# - Bed time (living/communal): frost/boost if cold/hot; off if comfortable
#
# Heat/cool thresholds vary by room and time of day.
# See each automation below for the exact Cold/Cool/Slightly Cool handling.
# The master bedroom intentionally remains the warmest profile.
#
# The Indoor Comfort TS sensor uses ASHRAE 55 PMV calculations which factor in
# air temperature, humidity, clothing insulation, and metabolic rate — giving a
# more accurate comfort assessment than the simpler Summer Simmer Index.
#
# DEPENDENCY: Indoor Thermal Comfort integration (UI-configured, not YAML).
# The sensor entities below are created by this integration and exist in the
# live HA instance but are not version-controlled. If missing, automations
# will fail safe (no action on unknown/unavailable sensor states).
#
# Sensor sources (all Indoor Comfort Thermal Sensation):
# - Living Room:    sensor.living_room_indoor_comfort_ts
# - Rumpus:         sensor.rumpus_indoor_comfort_ts
# - Master Bedroom: sensor.master_bedroom_indoor_comfort_ts
# - Kids Room:      sensor.kids_room_indoor_comfort_ts
# - Study Room:     sensor.study_room_indoor_comfort_ts
#
# Room naming (alias → entity):
# - Living Room:    communal space (also turns on when arriving home)
# - Rumpus:         communal space (also turns on when arriving home) [climate.rumpus_ac]
# - Master Bedroom: Steph & Phil
# - Kids Room:      Henry & Otto [climate.kids_room_ac]
# - Study Room:     Lucas [climate.study_room_ac] — currently disabled
#
# Related files:
# - 16_master_bedroom_morning_comfort.yaml: humidity control only
# - 12_morning_preheat.yaml: superseded; preheat reinstated as living_room_preheat_530am
# ============================================================================

# ============================================================================
# LIVING ROOM - Comfort at wake, frost/boost at bedtime (if sleeping), off otherwise
# ============================================================================

- id: living_room_time_based_comfort
  alias: "HVAC - Living Room - Comfort (Wake/Bed Time)"
  description: >
    At wake time, when occupancy is Home, set comfort preset and decide
    heat/cool mode based on Indoor Comfort thermal sensation (ASHRAE 55). At
    bed time, turn the living room AC off for the night. Also turns AC on when
    occupancy returns to Home so daytime comfort logic can resume. The separate
    living_room_preheat_530am automation still handles early-morning pre-heat.
    Wake/bed triggers auto-clear manual overrides.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      id: occupancy_change
    - trigger: time
      at: input_datetime.wakeup_time_living_room
      id: wake_time
    - trigger: time
      at: input_datetime.bedtime_living_room
      id: bed_time
  actions:
    - choose:
        # Occupancy change: turn on when entering Home from any non-Home state
        - conditions:
            - condition: trigger
              id: occupancy_change
            - condition: state
              entity_id: input_select.occupancy
              state: Home
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state != 'Home' }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.living_room_ac_2

        # Wake time: auto-clear override, presence-gated comfort preset + heat/cool
        # only after the house is back in Home mode
        - conditions:
            - condition: trigger
              id: wake_time
            - condition: state
              entity_id: input_select.occupancy
              state: Home
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_living
            - if:
                - condition: state
                  entity_id: binary_sensor.living_room_presence_active
                  state: "on"
              then:
                - action: climate.set_preset_mode
                  target:
                    entity_id: climate.living_room_ac_2
                  data:
                    preset_mode: comfort
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: sensor.living_room_indoor_comfort_ts
                          state:
                            - Cold
                            - Cool
                      sequence:
                        - action: climate.set_hvac_mode
                          target:
                            entity_id: climate.living_room_ac_2
                          data:
                            hvac_mode: heat
                    - conditions:
                        - condition: state
                          entity_id: sensor.living_room_indoor_comfort_ts
                          state:
                            - Slightly Warm
                            - Warm
                            - Hot
                      sequence:
                        - action: climate.set_hvac_mode
                          target:
                            entity_id: climate.living_room_ac_2
                          data:
                            hvac_mode: cool
              else:
                - action: climate.turn_off
                  target:
                    entity_id: climate.living_room_ac_2

        # Bed time: auto-clear override, then turn off overnight.
        # Early-morning heat is handled separately by living_room_preheat_530am.
        - conditions:
            - condition: trigger
              id: bed_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_living
            - action: climate.turn_off
              target:
                entity_id: climate.living_room_ac_2
  mode: single

# ============================================================================
# MASTER BEDROOM - Comfort at wake, frost/boost at bedtime (if sleeping)
# ============================================================================

- id: master_bedroom_time_based_day
  alias: "HVAC - Master Bedroom - Wake Up Comfort"
  description: >
    At wake time, auto-clear manual override, set comfort preset and decide
    heat/cool based on Indoor Comfort thermal sensation. Cold/Cool → heat,
    Slightly Cool/Neutral → no mode change, Slightly Warm+ → cool.
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wake_time
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_manual_control_master
    - action: climate.set_preset_mode
      target:
        entity_id: climate.masterbed_room_ac
      data:
        preset_mode: comfort
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
  mode: single

- id: master_bedroom_time_based_night
  alias: "HVAC - Master Bedroom - Bedtime"
  description: >
    At bedtime, auto-clear manual override, always set heat or cool — AC stays
    on all night. User selects Heat/Cool/Auto via input_select.bedtime_hvac_mode.
    Heat → frost+heat, Cool → boost+cool, Auto → comfort-sensor fallback.
    If sensor is unknown/unavailable in Auto mode, no action (fail safe).
  triggers:
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_manual_control_master
    - choose:
        # --- User forced Heat ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Heat
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # --- User forced Cool ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        # --- Auto: fall back to comfort sensor ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Auto
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Auto
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Cool
                - Neutral
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      # default: Auto + sensor unknown/unavailable — no action (fail safe)
  mode: single

- id: master_bedroom_away_mode
  alias: "HVAC - Master Bedroom - Occupancy On"
  description: "Turn master bedroom on when arriving to Home/Sleeping."
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.masterbed_room_ac
  mode: single

- id: master_bedroom_workday_wfh_daytime_comfort
  alias: "HVAC - Master Bedroom - WFH Daytime Comfort"
  description: >
    Keeps the master bedroom comfortable while working from home. Activates
    when WFH begins (PC / desk turns on) and reacts to thermal comfort
    changes. Cold/Cool/Slightly Cool → heat + comfort, Slightly Warm/Warm/Hot
    → cool + comfort, Neutral → AC off. Turns off when WFH ends.
  triggers:
    - trigger: state
      entity_id: binary_sensor.working_from_home
      to: "on"
      id: wfh_start
    - trigger: state
      entity_id: binary_sensor.working_from_home
      to: "off"
      id: wfh_end
    - trigger: state
      entity_id: sensor.master_bedroom_indoor_comfort_ts
      to:
        - Cold
        - Cool
        - Slightly Cool
        - Slightly Warm
        - Warm
        - Hot
      for: "00:10:00"
      id: discomfort_stable
    - trigger: state
      entity_id: sensor.master_bedroom_indoor_comfort_ts
      to: Neutral
      for: "00:15:00"
      id: neutral_stable
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.master_bedroom_indoor_comfort_ts
          state:
            - unknown
            - unavailable
    - condition: template
      value_template: >
        {% set bed = states('input_datetime.bedtime_master_bedroom') %}
        {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
        {{ not (now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake) }}
  actions:
    - choose:
        # --- WFH ended → turn off ---
        - conditions:
            - condition: trigger
              id: wfh_end
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.masterbed_room_ac
        # --- WFH active: Cold/Cool/Slightly Cool → heat + comfort ---
        - conditions:
            - condition: state
              entity_id: binary_sensor.working_from_home
              state: "on"
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
                - Slightly Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: comfort
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # --- WFH active: Slightly Warm/Warm/Hot → cool + comfort ---
        - conditions:
            - condition: state
              entity_id: binary_sensor.working_from_home
              state: "on"
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: comfort
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        # --- WFH active: Neutral → turn off ---
        - conditions:
            - condition: state
              entity_id: binary_sensor.working_from_home
              state: "on"
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state: Neutral
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.masterbed_room_ac
  mode: restart

