---
# ============================================================================
# TIME-BASED HVAC AUTOMATIONS
# ============================================================================
# This file implements per-room climate control based on wake/bed times.
#
# Logic:
# - Gates: manual override off; occupancy must be Home or Sleeping
# - Wake time: comfort preset; heat/cool decided by FELT temperature (humidex)
# - Bed time: eco (heat) or boost (cool) preset; same felt-temperature decision
#
# Heat/cool decision order (same for all rooms):
#   1. Humidex < 19°C  → heat  (feels cold regardless of season)
#   2. Humidex > 23°C  → cool  (feels warm regardless of season)
#   3. Season winter/autumn → heat  (moderate feel, cold-bias season)
#   4. Season summer/spring → cool  (moderate feel, warm-bias season)
#   5. Default              → off   (no match)
# Edit thresholds 19 / 23 to taste.
#
# WHY HUMIDEX INSTEAD OF RAW TEMPERATURE:
# Humidity dramatically changes perceived warmth. A 21°C room at 70% humidity
# feels noticeably warmer than 21°C at 40% humidity. Using the humidex
# (heat index) means the automation responds to how the room actually feels
# rather than the thermometer reading alone. This fixes the problem where
# 21°C feels warm in the lounge (high humidity) but cold in the bedroom.
#
# Sensor sources (all INDOOR humidex):
# - Living Room:    sensor.living_room_thermal_comfort_humidex
# - Rumpus:         sensor.rumpus_thermal_comfort_humidex
# - Master Bedroom: sensor.thermal_comfort_humidex
# - Otto's Room:    sensor.kids_room_thermal_comfort_humidex
# - Lucas's Room:   sensor.study_room_thermal_comfort_humidex
#
# Rooms:
# - Living Room:    communal space (also turns on when arriving home)
# - Rumpus:         communal space (also turns on when arriving home)
# - Master Bedroom: Steph & Phil
# - Otto's Room:    Henry & Otto
# - Lucas's Room:   Lucas (formerly Study/Henry's Room)
#
# Related files:
# - 16_master_bedroom_morning_comfort.yaml: humidity control only
#   (morning-comfort and exit automations in that file are superseded by
#    master_bedroom_time_based_day / master_bedroom_time_based_night here)
# - 12_morning_preheat.yaml: superseded by living_room_time_based_comfort
# ============================================================================

# ============================================================================
# LIVING ROOM - Comfort at wake/bed, turn on when arriving home
# ============================================================================

- id: living_room_time_based_comfort
  alias: "HVAC - Living Room - Comfort (Wake/Bed Time)"
  description: >
    At wake and bed times, set comfort preset and decide heat/cool mode
    based on outside temperature, with season as fallback. Also turns the
    AC on when the household arrives home from away.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      id: occupancy_change
    - trigger: time
      at: input_datetime.wakeup_time_living_room
      id: wake_time
    - trigger: time
      at: input_datetime.bedtime_living_room
      id: bed_time
  conditions:
    # Gate: manual override must be off
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
  actions:
    - choose:
        # Occupancy change: turn on when arriving home/sleeping from away
        - conditions:
            - condition: trigger
              id: occupancy_change
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state not in ['Home', 'Sleeping'] }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.living_room_ac_2

        # Wake/bed time: set comfort and decide heat/cool
        - conditions:
            - condition: trigger
              id:
                - wake_time
                - bed_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                preset_mode: comfort
            # Decide heat or cool based on indoor felt temperature (humidex).
            - choose:
                # Feels cold (humidex < 19°C) → heat
                - conditions:
                    - condition: numeric_state
                      entity_id: sensor.living_room_thermal_comfort_humidex
                      below: 19
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                # Feels warm (humidex > 23°C) → cool
                - conditions:
                    - condition: numeric_state
                      entity_id: sensor.living_room_thermal_comfort_humidex
                      above: 23
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
                # Moderate + winter/autumn → heat
                - conditions:
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: input_select.climate_season
                          state: winter
                        - condition: state
                          entity_id: input_select.climate_season
                          state: autumn
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                # Moderate + summer/spring → cool
                - conditions:
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: input_select.climate_season
                          state: summer
                        - condition: state
                          entity_id: input_select.climate_season
                          state: spring
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
              default:
                - action: climate.set_hvac_mode
                  target:
                    entity_id: climate.living_room_ac_2
                  data:
                    hvac_mode: "off"
  mode: single

# ============================================================================
# MASTER BEDROOM - Comfort at wake, Eco/Boost at bedtime
# ============================================================================

- id: master_bedroom_time_based_day
  alias: "HVAC - Master Bedroom - Wake Up Comfort"
  description: >
    At wake time, set comfort preset and decide heat/cool based on indoor
    felt temperature (humidex). Uses sensor.thermal_comfort_humidex which
    accounts for room humidity, giving a more accurate sense of how warm
    the room actually feels (< 19°C heat, > 23°C cool, otherwise season-based).
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wake_time
  conditions:
    # Gate 1: Manual override must be off
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    # Gate 2: Occupancy must be Home or Sleeping
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    # Step 1: Set comfort preset for waking up
    - action: climate.set_preset_mode
      target:
        entity_id: climate.masterbed_room_ac
      data:
        preset_mode: comfort
    # Step 2: Decide heat or cool using INDOOR humidex (felt temperature)
    # sensor.thermal_comfort_humidex = Master Bedroom indoor thermal comfort humidex
    - choose:
        # Feels cold (indoor humidex < 19°C) → heat
        - conditions:
            - condition: numeric_state
              entity_id: sensor.thermal_comfort_humidex
              below: 19
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # Feels warm (indoor humidex > 23°C) → cool
        - conditions:
            - condition: numeric_state
              entity_id: sensor.thermal_comfort_humidex
              above: 23
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        # Moderate + winter/autumn → heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # Moderate + summer/spring → cool
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: summer
                - condition: state
                  entity_id: input_select.climate_season
                  state: spring
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.masterbed_room_ac
          data:
            hvac_mode: "off"
  mode: single

- id: master_bedroom_time_based_night
  alias: "HVAC - Master Bedroom - Bedtime Eco/Boost"
  description: >
    At bedtime, set eco preset (heat) or boost preset (cool) based on
    indoor felt temperature (humidex). Uses sensor.thermal_comfort_humidex
    which accounts for room humidity (< 19°C eco+heat, > 23°C boost+cool,
    otherwise season-based).
  triggers:
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
  conditions:
    # Gate 1: Manual override must be off
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    # Gate 2: Occupancy must be Home or Sleeping
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    # Set nighttime preset and hvac_mode based on INDOOR humidex (felt temperature)
    # sensor.thermal_comfort_humidex = Master Bedroom indoor thermal comfort humidex
    - choose:
        # Feels cold (indoor humidex < 19°C) → eco + heat
        - conditions:
            - condition: numeric_state
              entity_id: sensor.thermal_comfort_humidex
              below: 19
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: eco
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # Feels warm (indoor humidex > 23°C) → boost + cool
        - conditions:
            - condition: numeric_state
              entity_id: sensor.thermal_comfort_humidex
              above: 23
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        # Moderate + winter/autumn → eco + heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: eco
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # Moderate + summer/spring → boost + cool
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: summer
                - condition: state
                  entity_id: input_select.climate_season
                  state: spring
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.masterbed_room_ac
          data:
            hvac_mode: "off"
  mode: single

- id: master_bedroom_away_mode
  alias: "HVAC - Master Bedroom - Occupancy On"
  description: "Turn master bedroom on when arriving to Home/Sleeping."
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.masterbed_room_ac
  mode: single

