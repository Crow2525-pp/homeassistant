---
# ============================================================================
# TIME-BASED HVAC AUTOMATIONS
# ============================================================================
# This file implements per-room climate control based on wake/bed times.
#
# Logic:
# - Gates: manual override off; occupancy must be Home or Sleeping
# - Wake time: comfort preset; heat/cool decided by Indoor Comfort TS (ASHRAE 55)
# - Bed time (bedrooms): always heat or cool — AC stays on all night
#     Cold / Cool → frost+heat; everything else → boost+cool (favor cooling)
# - Bed time (living/communal): frost/boost if cold/hot; off if comfortable
#
# Heat/cool decision — daytime (wake→bed):
#   Indoor Comfort Thermal Sensation (TS):
#     Cold / Cool            → heat
#     Slightly Cool / Neutral → off   (room is comfortable, no intervention)
#     Slightly Warm and above → cool
#
# Heat/cool decision — nighttime rechecks (bedrooms only, bed→wake):
#   Same as bedtime: Cold/Cool → frost+heat; else → boost+cool
#   Preset is set with mode to prevent stale preset mismatch.
#
# The Indoor Comfort TS sensor uses ASHRAE 55 PMV calculations which factor in
# air temperature, humidity, clothing insulation, and metabolic rate — giving a
# more accurate comfort assessment than the simpler Summer Simmer Index.
#
# DEPENDENCY: Indoor Thermal Comfort integration (UI-configured, not YAML).
# The sensor entities below are created by this integration and exist in the
# live HA instance but are not version-controlled. If missing, automations
# will fail safe (no action on unknown/unavailable sensor states).
#
# Sensor sources (all Indoor Comfort Thermal Sensation):
# - Living Room:    sensor.living_room_indoor_comfort_ts
# - Rumpus:         sensor.rumpus_indoor_comfort_ts
# - Master Bedroom: sensor.master_bedroom_indoor_comfort_ts
# - Kids Room:      sensor.kids_room_indoor_comfort_ts
# - Study Room:     sensor.study_room_indoor_comfort_ts
#
# Room naming (alias → entity):
# - Living Room:    communal space (also turns on when arriving home)
# - Rumpus:         communal space (also turns on when arriving home) [climate.rumpus_ac]
# - Master Bedroom: Steph & Phil
# - Kids Room:      Henry & Otto [climate.kids_room_ac]
# - Study Room:     Lucas [climate.study_room_ac] — currently disabled
#
# Related files:
# - 16_master_bedroom_morning_comfort.yaml: humidity control only
# - 12_morning_preheat.yaml: superseded; preheat reinstated as living_room_preheat_530am
# ============================================================================

# ============================================================================
# LIVING ROOM - Comfort at wake, frost/boost at bedtime (if sleeping), off otherwise
# ============================================================================

- id: living_room_time_based_comfort
  alias: "HVAC - Living Room - Comfort (Wake/Bed Time)"
  description: >
    At wake time, set comfort preset and decide heat/cool mode based on Indoor
    Comfort thermal sensation (ASHRAE 55). At bed time, set frost+heat or
    boost+cool if cold/hot; off if comfortable or just home. Also turns AC on
    when arriving home.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      id: occupancy_change
    - trigger: time
      at: input_datetime.wakeup_time_living_room
      id: wake_time
    - trigger: time
      at: input_datetime.bedtime_living_room
      id: bed_time
  actions:
    - choose:
        # Occupancy change: turn on when arriving home/sleeping from away
        - conditions:
            - condition: trigger
              id: occupancy_change
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state not in ['Home', 'Sleeping'] }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.living_room_ac_2

        # Wake time: comfort preset + heat/cool decision
        - conditions:
            - condition: trigger
              id: wake_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                preset_mode: comfort
            - choose:
                - conditions:
                    - condition: state
                      entity_id: sensor.living_room_indoor_comfort_ts
                      state:
                        - Cold
                        - Cool
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: sensor.living_room_indoor_comfort_ts
                      state:
                        - Slightly Warm
                        - Warm
                        - Hot
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool

        # Bed time: frost/boost if cold/hot, off if comfortable or just home
        - conditions:
            - condition: trigger
              id: bed_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: sensor.living_room_indoor_comfort_ts
                      state:
                        - Cold
                        - Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: sensor.living_room_indoor_comfort_ts
                      state:
                        - Slightly Warm
                        - Warm
                        - Hot
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
              default:
                - action: climate.turn_off
                  target:
                    entity_id: climate.living_room_ac_2
  mode: single

# ============================================================================
# MASTER BEDROOM - Comfort at wake, frost/boost at bedtime (if sleeping)
# ============================================================================

- id: master_bedroom_time_based_day
  alias: "HVAC - Master Bedroom - Wake Up Comfort"
  description: >
    At wake time, set comfort preset and decide heat/cool based on indoor
    Indoor Comfort thermal sensation. Cold/Cool → heat, Slightly Warm+ → cool,
    Slightly Cool/Neutral → no mode change.
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wake_time
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.masterbed_room_ac
      data:
        preset_mode: comfort
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
  mode: single

- id: master_bedroom_time_based_night
  alias: "HVAC - Master Bedroom - Bedtime"
  description: >
    At bedtime, always set heat or cool — AC stays on all night. Cold/Cool →
    frost+heat; any other valid TS → boost+cool (favor cooling for sleep
    comfort). If sensor is unknown/unavailable, no action (fail safe).
  triggers:
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Cool
                - Neutral
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      # default: sensor unknown/unavailable — no action (fail safe)
  mode: single

- id: master_bedroom_away_mode
  alias: "HVAC - Master Bedroom - Occupancy On"
  description: "Turn master bedroom on when arriving to Home/Sleeping."
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.masterbed_room_ac
  mode: single

