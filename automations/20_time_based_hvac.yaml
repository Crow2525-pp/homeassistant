- id: rumpus_hourly_recheck
  alias: "HVAC - Rumpus - Half-Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "/30"
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_rumpus
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.rumpus_ac
          state: "off"
  actions:
    - choose:
        # cool-only AC: if warm, ensure cool mode; otherwise turn off
        - conditions:
            - condition: state
              entity_id: sensor.rumpus_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: cool
      default:
        # Cold/Slightly Cool/Neutral — AC can't heat, turn off
        - action: climate.turn_off
          target:
            entity_id: climate.rumpus_ac
  mode: single

# ============================================================================
# HALF-HOURLY MODE RE-CHECK
# ============================================================================
# Every 30 minutes, if someone is home/sleeping, the AC is already running,
# and manual override is off — re-evaluate heat vs cool based on current
# Indoor Comfort thermal sensation (ASHRAE 55). Only the hvac_mode is
# updated; preset is unchanged. In the Slightly Cool/Neutral zone, the AC
# is turned off.
# ============================================================================

- id: living_room_hourly_recheck
  alias: "HVAC - Living Room - Half-Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "/30"
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.living_room_ac_2
          state: "off"
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.living_room_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: sensor.living_room_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: cool
      default:
        # Slightly Cool / Neutral — room is fine, stop the AC
        - action: climate.turn_off
          target:
            entity_id: climate.living_room_ac_2
  mode: single

