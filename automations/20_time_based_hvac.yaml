# ============================================================================
# LIVING ROOM - Pre-heat if cold (configurable time, pre-wake comfort boost)
# Adjust input_datetime.preheat_time_living_room earlier as winter deepens.
# ============================================================================

- id: living_room_preheat_530am
  alias: "HVAC - Living Room - Pre-heat if Cold (Configurable Time)"
  description: >
    At the configured pre-heat time (input_datetime.preheat_time_living_room,
    default 05:30), if the living room feels cold (Indoor Comfort TS is Cold
    or Cool), set comfort preset + heat so the room is warm before wake time.
  triggers:
    - trigger: time
      at: input_datetime.preheat_time_living_room
  conditions:
    - condition: state
      entity_id: sensor.living_room_indoor_comfort_ts
      state:
        - Cold
        - Cool
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.living_room_ac_2
      data:
        preset_mode: comfort
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.living_room_ac_2
      data:
        hvac_mode: heat
  mode: single
