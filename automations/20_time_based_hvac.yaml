# ============================================================================
# STUDY ROOM - guest kid room
# Runs only when Guest Staying is on and follows the kids room schedule so the
# study behaves like a guest/kid bedroom without changing the base room helpers.
# ============================================================================

- id: lucas_room_time_based_day
  alias: "HVAC - Study Room - Wake Up (Off)"
  description: >
    When Guest Staying is on, the study follows the kids wake-up time. At wake
    time, auto-clear manual override and turn off AC — the study does not run
    HVAC during the day. Night behaviour is handled by the bedtime automation.
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_ottos_room
      id: wake_time
  conditions:
    - condition: state
      entity_id: input_boolean.study_occupied
      state: "on"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_manual_control_study
    - action: climate.turn_off
      target:
        entity_id: climate.study_room_ac
  mode: single

- id: lucas_room_time_based_night
  alias: "HVAC - Study Room - Bedtime"
  description: >
    When Guest Staying is on, the study follows the kids bedtime so it behaves
    like a guest/kid bedroom. At bedtime, auto-clear manual override and always
    set heat or cool through the night. User selects Heat/Cool/Auto via
    input_select.bedtime_hvac_mode. Auto → comfort-sensor fallback.
    If sensor is unknown/unavailable in Auto mode, no action (fail safe).
  triggers:
    - trigger: time
      at: input_datetime.bedtime_ottos_room
      id: bed_time
  conditions:
    - condition: state
      entity_id: input_boolean.study_occupied
      state: "on"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_manual_control_study
    - choose:
        # --- User forced Heat ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Heat
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.study_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.study_room_ac
              data:
                hvac_mode: heat
        # --- User forced Cool ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.study_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.study_room_ac
              data:
                hvac_mode: cool
        # --- Auto: fall back to comfort sensor ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Auto
            - condition: state
              entity_id: sensor.study_room_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.study_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.study_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Auto
            - condition: state
              entity_id: sensor.study_room_indoor_comfort_ts
              state:
                - Slightly Cool
                - Neutral
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.study_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.study_room_ac
              data:
                hvac_mode: cool
      # default: Auto + sensor unknown/unavailable — no action (fail safe)
  mode: single

- id: lucas_room_away_mode
  alias: "HVAC - Study Room - Occupancy On"
  description: >
    Turn Study Room on when arriving to Home/Sleeping during guest stays, but
    only at night (study has no daytime HVAC).
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_study
      state: "off"
    - condition: state
      entity_id: input_boolean.study_occupied
      state: "on"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
    # Only turn on at night — study has no daytime HVAC
    - condition: template
      value_template: >
        {% set bed = states('input_datetime.bedtime_ottos_room') %}
        {% set wake = states('input_datetime.wakeup_time_ottos_room') %}
        {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.study_room_ac
  mode: single

- id: lucas_room_hourly_recheck
  alias: "HVAC - Study Room - Half-Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "/30"
      id: time_trigger
    - trigger: state
      entity_id: input_boolean.climate_manual_control_study
      from: "on"
      to: "off"
      id: override_cleared
    - trigger: state
      entity_id: input_select.occupancy
      to: Home
      id: occupancy_change
    - trigger: state
      entity_id: input_select.occupancy
      to: Sleeping
      id: occupancy_change
    - trigger: state
      entity_id: input_boolean.study_occupied
      to:
        - "on"
        - "off"
      id: guest_mode_toggle
    # React immediately when comfort leaves the neutral zone
    - trigger: state
      entity_id: sensor.study_room_indoor_comfort_ts
      to:
        - Cold
        - Cool
        - Slightly Cool
        - Slightly Warm
        - Warm
        - Hot
      id: comfort_change
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_study
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
        - condition: and
          conditions:
            - condition: trigger
              id: guest_mode_toggle
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "off"
    - condition: or
      conditions:
        - condition: and
          conditions:
            - condition: trigger
              id: occupancy_change
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state in ['Away', 'Holiday'] }}
        - condition: trigger
          id: guest_mode_toggle
        - condition: trigger
          id: comfort_change
        - condition: trigger
          id: override_cleared
        - condition: and
          conditions:
            - condition: trigger
              id: time_trigger
            - condition: or
              conditions:
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: climate.study_room_ac
                      state: "off"
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: sensor.study_room_indoor_comfort_ts
                      state: Neutral
    - condition: or
      conditions:
        - condition: and
          conditions:
            - condition: trigger
              id: guest_mode_toggle
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "off"
        - condition: not
          conditions:
            - condition: state
              entity_id: sensor.study_room_indoor_comfort_ts
              state:
                - unknown
                - unavailable
  actions:
    - variables:
        is_nighttime: >
          {% set bed = states('input_datetime.bedtime_ottos_room') %}
          {% set wake = states('input_datetime.wakeup_time_ottos_room') %}
          {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
    - choose:
        - conditions:
            - condition: trigger
              id: guest_mode_toggle
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "off"
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.study_room_ac
        - conditions:
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "on"
          sequence:
            - if:
                - condition: template
                  value_template: "{{ is_nighttime }}"
              then:
                # Night: existing comfort logic (Slightly Cool removed from heat)
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: sensor.study_room_indoor_comfort_ts
                          state:
                            - Cold
                            - Cool
                      sequence:
                        - action: climate.set_preset_mode
                          target:
                            entity_id: climate.study_room_ac
                          data:
                            preset_mode: frost
                        - action: climate.set_hvac_mode
                          target:
                            entity_id: climate.study_room_ac
                          data:
                            hvac_mode: heat
                    - conditions:
                        - condition: state
                          entity_id: sensor.study_room_indoor_comfort_ts
                          state:
                            - Slightly Cool
                            - Neutral
                            - Slightly Warm
                            - Warm
                            - Hot
                      sequence:
                        - action: climate.set_preset_mode
                          target:
                            entity_id: climate.study_room_ac
                          data:
                            preset_mode: boost
                        - action: climate.set_hvac_mode
                          target:
                            entity_id: climate.study_room_ac
                          data:
                            hvac_mode: cool
              else:
                # Daytime: study has no daytime HVAC
                - action: climate.turn_off
                  target:
                    entity_id: climate.study_room_ac
  mode: single

# ============================================================================
# RUMPUS - communal space, or adult guest room when Guest Staying is on
# ============================================================================

- id: rumpus_time_based_day
  alias: "HVAC - Rumpus - Wake Up (Off)"
  description: >
    At wake time, auto-clear manual override and turn off AC — the rumpus does
    not run HVAC during the day. Uses rumpus wake time normally; when Guest
    Staying is on, follows master bedroom wake-up time. Night behaviour is
    handled by the bedtime automation.
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_rumpus
      id: wake_time
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: guest_wake_time
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "on"
            - condition: trigger
              id: guest_wake_time
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_rumpus
            - action: climate.turn_off
              target:
                entity_id: climate.rumpus_ac
        - conditions:
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "off"
            - condition: trigger
              id: wake_time
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_rumpus
            - action: climate.turn_off
              target:
                entity_id: climate.rumpus_ac
  mode: single

- id: rumpus_time_based_night
  alias: "HVAC - Rumpus - Bedtime"
  description: >
    Uses the rumpus bedtime normally. When Guest Staying is on, it follows the
    master bedroom bedtime so the rumpus behaves like an adult guest room.
    User selects Heat/Cool/Auto via input_select.bedtime_hvac_mode.
    Auto → comfort-sensor fallback. If sensor is unknown/unavailable in Auto
    mode, no action (fail safe).
  triggers:
    - trigger: time
      at: input_datetime.bedtime_rumpus
      id: bed_time
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: guest_bed_time
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - choose:
        # === Guest staying: follow master bedroom bedtime ===
        - conditions:
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "on"
            - condition: trigger
              id: guest_bed_time
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_rumpus
            - choose:
                # --- User forced Heat ---
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Heat
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
                # --- User forced Cool ---
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: cool
                # --- Auto: fall back to comfort sensor ---
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Auto
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state:
                        - Cold
                        - Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Auto
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state:
                        - Slightly Cool
                        - Neutral
                        - Slightly Warm
                        - Warm
                        - Hot
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: cool
        # === No guest: normal rumpus bedtime ===
        - conditions:
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "off"
            - condition: trigger
              id: bed_time
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_rumpus
            - choose:
                # --- User forced Heat (only when Sleeping) ---
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Heat
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
                # --- User forced Cool (only when Sleeping) ---
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: cool
                # --- Auto: fall back to comfort sensor (only when Sleeping + Cold/Cool) ---
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Auto
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state:
                        - Cold
                        - Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
              default:
                - action: climate.turn_off
                  target:
                    entity_id: climate.rumpus_ac
  mode: single

- id: rumpus_away_mode
  alias: "HVAC - Rumpus - Occupancy On"
  description: >
    Turn Rumpus on when arriving to Home/Sleeping, but only during the active
    nighttime schedule.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_rumpus
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
    - condition: template
      value_template: >
        {% if is_state('input_boolean.study_occupied', 'on') %}
          {% set bed = states('input_datetime.bedtime_master_bedroom') %}
          {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
        {% else %}
          {% set bed = states('input_datetime.bedtime_rumpus') %}
          {% set wake = states('input_datetime.wakeup_time_rumpus') %}
        {% endif %}
        {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
    # Only turn on if the room actually needs heating or cooling —
    # avoids a race with the Re-check automation which would immediately
    # turn the AC off again when comfort is Neutral.
    - condition: state
      entity_id: sensor.rumpus_indoor_comfort_ts
      state:
        - Cold
        - Cool
        - Slightly Warm
        - Warm
        - Hot
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.rumpus_ac
  mode: single

- id: rumpus_hourly_recheck
  alias: "HVAC - Rumpus - Half-Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "/30"
      id: time_trigger
    - trigger: state
      entity_id: input_boolean.climate_manual_control_rumpus
      from: "on"
      to: "off"
      id: override_cleared
    - trigger: state
      entity_id: input_select.occupancy
      to: Home
      id: occupancy_change
    - trigger: state
      entity_id: input_select.occupancy
      to: Sleeping
      id: occupancy_change
    - trigger: state
      entity_id: input_boolean.study_occupied
      to:
        - "on"
        - "off"
      id: guest_mode_toggle
    # React immediately when comfort leaves the neutral zone
    - trigger: state
      entity_id: sensor.rumpus_indoor_comfort_ts
      to:
        - Cold
        - Cool
        - Slightly Cool
        - Slightly Warm
        - Warm
        - Hot
      id: comfort_change
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_rumpus
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: or
      conditions:
        - condition: trigger
          id: guest_mode_toggle
        - condition: and
          conditions:
            - condition: trigger
              id: occupancy_change
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state in ['Away', 'Holiday'] }}
        - condition: trigger
          id: comfort_change
        - condition: trigger
          id: override_cleared
        - condition: and
          conditions:
            - condition: trigger
              id: time_trigger
            - condition: or
              conditions:
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: climate.rumpus_ac
                      state: "off"
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state: Neutral
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.rumpus_indoor_comfort_ts
          state:
            - unknown
            - unavailable
  actions:
    - variables:
        is_guest_nighttime: >
          {% set bed = states('input_datetime.bedtime_master_bedroom') %}
          {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
          {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
        is_rumpus_nighttime: >
          {% set bed = states('input_datetime.bedtime_rumpus') %}
          {% set wake = states('input_datetime.wakeup_time_rumpus') %}
          {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "on"
          sequence:
            - if:
                - condition: template
                  value_template: "{{ is_guest_nighttime }}"
              then:
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: sensor.rumpus_indoor_comfort_ts
                          state:
                            - Cold
                            - Cool
                      sequence:
                        - action: climate.set_preset_mode
                          target:
                            entity_id: climate.rumpus_ac
                          data:
                            preset_mode: frost
                        - action: climate.set_hvac_mode
                          target:
                            entity_id: climate.rumpus_ac
                          data:
                            hvac_mode: heat
                    - conditions:
                        - condition: state
                          entity_id: sensor.rumpus_indoor_comfort_ts
                          state:
                            - Slightly Warm
                            - Warm
                            - Hot
                      sequence:
                        - action: climate.set_preset_mode
                          target:
                            entity_id: climate.rumpus_ac
                          data:
                            preset_mode: boost
                        - action: climate.set_hvac_mode
                          target:
                            entity_id: climate.rumpus_ac
                          data:
                            hvac_mode: cool
                    - conditions:
                        - condition: state
                          entity_id: sensor.rumpus_indoor_comfort_ts
                          state:
                            - Slightly Cool
                            - Neutral
                      sequence:
                        - action: climate.set_preset_mode
                          target:
                            entity_id: climate.rumpus_ac
                          data:
                            preset_mode: boost
                        - action: climate.set_hvac_mode
                          target:
                            entity_id: climate.rumpus_ac
                          data:
                            hvac_mode: cool
              else:
                - action: climate.turn_off
                  target:
                    entity_id: climate.rumpus_ac
      default:
        - if:
            - condition: template
              value_template: "{{ is_rumpus_nighttime }}"
          then:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state:
                        - Cold
                        - Cool
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state:
                        - Slightly Warm
                        - Warm
                        - Hot
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: cool
              default:
                - action: climate.turn_off
                  target:
                    entity_id: climate.rumpus_ac
          else:
            - action: climate.turn_off
              target:
                entity_id: climate.rumpus_ac
  mode: single

# ============================================================================
# HALF-HOURLY MODE RE-CHECK
# ============================================================================
# Triggers:
#   1. Comfort sensor changes to a non-neutral state (Cold, Cool, Slightly Cool,
#      Slightly Warm, Warm, Hot) — reacts immediately, even if AC is off.
#   2. Every 30 minutes (time_pattern) — fallback re-check if AC is already
#      running.
#   3. Occupancy changes to Home or Sleeping from Away/Holiday — immediately
#      set the correct hvac_mode after return-home turn-on.
#   4. Manual override changes from on to off — immediately resume automatic
#      control for that room.
#
# Only the hvac_mode is updated; preset is unchanged (except bedrooms at night).
# In the Neutral zone, the AC is turned off (daytime only for bedrooms).
# ============================================================================

- id: living_room_hourly_recheck
  alias: "HVAC - Living Room - Half-Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "/30"
      id: time_trigger
    - trigger: state
      entity_id: input_boolean.climate_manual_control_living
      from: "on"
      to: "off"
      id: override_cleared
    - trigger: state
      entity_id: input_select.occupancy
      to: Home
      id: occupancy_change
    - trigger: state
      entity_id: input_select.occupancy
      to: Sleeping
      id: occupancy_change
    # React immediately when comfort leaves the neutral zone
    - trigger: state
      entity_id: sensor.living_room_indoor_comfort_ts
      to:
        - Cold
        - Cool
        - Slightly Cool
        - Slightly Warm
        - Warm
        - Hot
      id: comfort_change
    - trigger: state
      entity_id: binary_sensor.living_room_presence_active
      to: "on"
      id: presence_established
    - trigger: state
      entity_id: binary_sensor.living_room_presence_active
      to: "off"
      id: presence_lost
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: or
      conditions:
        # Occupancy change: skip AC-state check — AC was just turned on by return-home
        # Only act when transitioning from Away or Holiday
        - condition: and
          conditions:
            - condition: trigger
              id: occupancy_change
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state in ['Away', 'Holiday'] }}
        # Comfort change: always allow — react immediately to discomfort
        - condition: trigger
          id: comfort_change
        # Manual override cleared: resume auto control immediately
        - condition: trigger
          id: override_cleared
        - condition: trigger
          id: presence_established
        - condition: trigger
          id: presence_lost
        # Time trigger: re-check while running, or recover from off when
        # comfort has drifted away from Neutral
        - condition: and
          conditions:
            - condition: trigger
              id: time_trigger
            - condition: or
              conditions:
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: climate.living_room_ac_2
                      state: "off"
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: sensor.living_room_indoor_comfort_ts
                      state: Neutral
  actions:
    - variables:
        is_daytime: >
          {% set bed = states('input_datetime.bedtime_living_room') %}
          {% set wake = states('input_datetime.wakeup_time_living_room') %}
          {{ not (now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake) }}
        is_preheat_window: >
          {% set preheat = states('input_datetime.preheat_time_living_room') %}
          {% set wake = states('input_datetime.wakeup_time_living_room') %}
          {% set now_time = now().strftime('%H:%M:%S') %}
          {% if preheat in ['unknown', 'unavailable', ''] or wake in ['unknown', 'unavailable', ''] %}
            false
          {% else %}
            {{ preheat <= now_time and now_time < wake }}
          {% endif %}
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
            - condition: template
              value_template: "{{ is_preheat_window | trim != 'True' }}"
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.living_room_ac_2
        - conditions:
            - condition: template
              value_template: "{{ is_daytime }}"
            - condition: state
              entity_id: binary_sensor.living_room_presence_active
              state: "on"
          sequence:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: sensor.living_room_indoor_comfort_ts
                      state:
                        - Cold
                        - Cool
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: sensor.living_room_indoor_comfort_ts
                      state:
                        - Slightly Warm
                        - Warm
                        - Hot
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
              default:
                - action: climate.turn_off
                  target:
                    entity_id: climate.living_room_ac_2
        - conditions:
            - condition: template
              value_template: "{{ is_daytime }}"
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.living_room_ac_2
      default:
        - choose:
            - conditions:
                - condition: state
                  entity_id: sensor.living_room_indoor_comfort_ts
                  state:
                    - Cold
                    - Cool
              sequence:
                - action: climate.set_hvac_mode
                  target:
                    entity_id: climate.living_room_ac_2
                  data:
                    hvac_mode: heat
            - conditions:
                - condition: state
                  entity_id: sensor.living_room_indoor_comfort_ts
                  state:
                    - Slightly Warm
                    - Warm
                    - Hot
              sequence:
                - action: climate.set_hvac_mode
                  target:
                    entity_id: climate.living_room_ac_2
                  data:
                    hvac_mode: cool
          default:
            - action: climate.turn_off
              target:
                entity_id: climate.living_room_ac_2
  mode: single

- id: master_bedroom_hourly_recheck
  alias: "HVAC - Master Bedroom - Half-Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "/30"
      id: time_trigger
    - trigger: state
      entity_id: input_boolean.climate_manual_control_master
      from: "on"
      to: "off"
      id: override_cleared
    - trigger: state
      entity_id: input_select.occupancy
      to: Home
      id: occupancy_change
    - trigger: state
      entity_id: input_select.occupancy
      to: Sleeping
      id: occupancy_change
    # React immediately when comfort leaves the neutral zone
    - trigger: state
      entity_id: sensor.master_bedroom_indoor_comfort_ts
      to:
        - Cold
        - Cool
        - Slightly Cool
        - Slightly Warm
        - Warm
        - Hot
      id: comfort_change
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: or
      conditions:
        # Occupancy change: skip AC-state check — AC was just turned on by return-home
        # Only act when transitioning from Away or Holiday
        - condition: and
          conditions:
            - condition: trigger
              id: occupancy_change
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state in ['Away', 'Holiday'] }}
        # Comfort change: always allow — react immediately to discomfort
        - condition: trigger
          id: comfort_change
        # Manual override cleared: resume auto control immediately
        - condition: trigger
          id: override_cleared
        # Time trigger: re-check while running, or recover from off when
        # comfort has drifted away from Neutral
        - condition: and
          conditions:
            - condition: trigger
              id: time_trigger
            - condition: or
              conditions:
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: climate.masterbed_room_ac
                      state: "off"
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: sensor.master_bedroom_indoor_comfort_ts
                      state: Neutral
    # Fail safe: skip if sensor is unknown/unavailable
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.master_bedroom_indoor_comfort_ts
          state:
            - unknown
            - unavailable
  actions:
    - variables:
        is_nighttime: >
          {% set bed = states('input_datetime.bedtime_master_bedroom') %}
          {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
          {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
    - choose:
        # Cold/Cool → heat (night: frost preset; day: no preset change)
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - if:
                - condition: template
                  value_template: "{{ is_nighttime }}"
              then:
                - action: climate.set_preset_mode
                  target:
                    entity_id: climate.masterbed_room_ac
                  data:
                    preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # --- Slightly Warm+ → cool (night Auto: boost preset; day: no preset change) ---
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - if:
                - condition: template
                  value_template: "{{ is_nighttime }}"
              then:
                - action: climate.set_preset_mode
                  target:
                    entity_id: climate.masterbed_room_ac
                  data:
                    preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        # --- Slightly Cool / Neutral — comfortable zone ---
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Cool
                - Neutral
          sequence:
            - choose:
                # Night: favor cool, never turn off
                - conditions:
                    - condition: template
                      value_template: "{{ is_nighttime }}"
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.masterbed_room_ac
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.masterbed_room_ac
                      data:
                        hvac_mode: cool
              default:
                # Day: only turn off if Neutral has been stable 15+ min
                # (prevents rapid on/off cycling near the comfort boundary)
                - if:
                    - condition: state
                      entity_id: sensor.master_bedroom_indoor_comfort_ts
                      state:
                        - Slightly Cool
                        - Neutral
                      for: "00:15:00"
                  then:
                    - action: climate.turn_off
                      target:
                        entity_id: climate.masterbed_room_ac
      # default: unexpected sensor state — no action (fail safe)
  mode: single

