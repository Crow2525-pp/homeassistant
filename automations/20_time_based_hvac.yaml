  description: >
    At wake time, set comfort preset and decide heat/cool based on indoor
    felt temperature (humidex). Uses sensor.thermal_comfort_humidex which
    accounts for room humidity (< 19°C heat, > 23°C cool, otherwise season-based).
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wake_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.masterbed_room_ac
      data:
        preset_mode: comfort
    - choose:
        - conditions:
            - condition: numeric_state
              entity_id: sensor.thermal_comfort_humidex
              below: 19
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: numeric_state
              entity_id: sensor.thermal_comfort_humidex
              above: 23
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: summer
                - condition: state
                  entity_id: input_select.climate_season
                  state: spring
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.masterbed_room_ac
          data:
            hvac_mode: "off"
  mode: single

- id: master_bedroom_time_based_night
  alias: "HVAC - Master Bedroom - Bedtime"
  description: >
    At bedtime, if sleeping: set frost+heat or boost+cool based on indoor
    humidex. If home but not sleeping: turn off.
  triggers:
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
            - condition: numeric_state
              entity_id: sensor.thermal_comfort_humidex
              below: 19
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
            - condition: numeric_state
              entity_id: sensor.thermal_comfort_humidex
              above: 23
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.turn_off
          target:
            entity_id: climate.masterbed_room_ac
  mode: single

- id: master_bedroom_away_mode
  alias: "HVAC - Master Bedroom - Occupancy On"
  description: "Turn master bedroom on when arriving to Home/Sleeping."
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.masterbed_room_ac
  mode: single

