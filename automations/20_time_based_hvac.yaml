# ============================================================================
# WENDY'S ROOM - Comfort at wake, frost/boost at bedtime (if sleeping)
# ============================================================================

- id: rumpus_time_based_day
  alias: "HVAC - Wendy's Room - Wake Up Comfort"
  description: >
    At wake time, set comfort preset and decide heat/cool based on indoor
    felt temperature (humidex). Uses sensor.rumpus_thermal_comfort_humidex
    (< 19°C heat, > 23°C cool, otherwise season-based).
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_rumpus
      id: wake_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_rumpus
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.rumpus_ac
      data:
        preset_mode: comfort
    - choose:
        - conditions:
            - condition: numeric_state
              entity_id: sensor.rumpus_thermal_comfort_humidex
              below: 19
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: numeric_state
              entity_id: sensor.rumpus_thermal_comfort_humidex
              above: 23
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: cool
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: summer
                - condition: state
                  entity_id: input_select.climate_season
                  state: spring
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.rumpus_ac
          data:
            hvac_mode: "off"
  mode: single

- id: rumpus_time_based_night
  alias: "HVAC - Wendy's Room - Bedtime"
  description: >
    At bedtime, if sleeping: set frost+heat or boost+cool based on indoor
    humidex. If home but not sleeping: turn off.
  triggers:
    - trigger: time
      at: input_datetime.bedtime_rumpus
      id: bed_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_rumpus
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
            - condition: numeric_state
              entity_id: sensor.rumpus_thermal_comfort_humidex
              below: 19
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
            - condition: numeric_state
              entity_id: sensor.rumpus_thermal_comfort_humidex
              above: 23
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: cool
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: input_select.occupancy
              state: Sleeping
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.turn_off
          target:
            entity_id: climate.rumpus_ac
  mode: single

- id: rumpus_away_mode
  alias: "HVAC - Wendy's Room - Occupancy On"
  description: "Turn Wendy's Room on when arriving to Home/Sleeping."
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.rumpus_ac
  mode: single

# ============================================================================
# HOURLY MODE RE-CHECK
# ============================================================================
# Every hour, if someone is home/sleeping, the AC is already running, and
# manual override is off — re-evaluate heat vs cool based on current indoor
# humidex. This handles conditions that shift during the day (e.g. morning
# heat-mode switching to cool as the day warms up, or vice versa).
# The preset is NOT changed — only the hvac_mode is updated.
# ============================================================================

- id: living_room_hourly_recheck
