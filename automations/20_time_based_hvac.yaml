---
# ============================================================================
# TIME-BASED HVAC AUTOMATIONS
# ============================================================================
# This file implements per-room climate control based on wake/bed times.
#
# Logic:
# - Gates: manual override off; occupancy must be Home or Sleeping
# - Wake time: comfort preset; heat/cool decided by FELT temperature (humidex)
# - Bed time (Sleeping): frost (heat) or boost (cool) based on humidex/season
# - Bed time (Home, not sleeping): off
#
# Heat/cool decision order (same for all rooms):
#   1. Humidex < 19°C  → heat  (feels cold regardless of season)
#   2. Humidex > 23°C  → cool  (feels warm regardless of season)
#   3. Season winter/autumn → heat  (moderate feel, cold-bias season)
#   4. Season summer/spring → cool  (moderate feel, warm-bias season)
#   5. Default              → off   (no match)
# Edit thresholds 19 / 23 to taste.
#
# WHY HUMIDEX INSTEAD OF RAW TEMPERATURE:
# Humidity dramatically changes perceived warmth. A 21°C room at 70% humidity
# feels noticeably warmer than 21°C at 40% humidity. Using the humidex
# (heat index) means the automation responds to how the room actually feels
# rather than the thermometer reading alone. This fixes the problem where
# 21°C feels warm in the lounge (high humidity) but cold in the bedroom.
#
# Sensor sources (all INDOOR humidex):
# - Living Room:    sensor.living_room_thermal_comfort_humidex
# - Wendy's Room:   sensor.rumpus_thermal_comfort_humidex
# - Master Bedroom: sensor.thermal_comfort_humidex
# - Kids Room:      sensor.kids_room_thermal_comfort_humidex
# - Study Room:     sensor.study_room_thermal_comfort_humidex
#
# Room naming (alias → entity):
# - Living Room:    communal space (also turns on when arriving home)
# - Wendy's Room:   communal space (also turns on when arriving home) [climate.rumpus_ac]
# - Master Bedroom: Steph & Phil
# - Kids Room:      Henry & Otto [climate.kids_room_ac]
# - Study Room:     Lucas [climate.study_room_ac]
#
# Related files:
# - 16_master_bedroom_morning_comfort.yaml: humidity control only
#   (morning-comfort and exit automations in that file are superseded by
#    master_bedroom_time_based_day / master_bedroom_time_based_night here)
# - 12_morning_preheat.yaml: superseded by living_room_time_based_comfort
# ============================================================================

# ============================================================================
# LIVING ROOM - Comfort at wake, frost/boost at bedtime (if sleeping), off otherwise
# ============================================================================

- id: living_room_time_based_comfort
  alias: "HVAC - Living Room - Comfort (Wake/Bed Time)"
  description: >
    At wake time, set comfort preset and decide heat/cool mode based on indoor
    felt temperature (humidex). At bed time, set frost+heat or boost+cool if
    sleeping, or turn off if just home. Also turns the AC on when arriving home.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      id: occupancy_change
    - trigger: time
      at: input_datetime.wakeup_time_living_room
      id: wake_time
    - trigger: time
      at: input_datetime.bedtime_living_room
      id: bed_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
  actions:
    - choose:
        # Occupancy change: turn on when arriving home/sleeping from away
        - conditions:
            - condition: trigger
              id: occupancy_change
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state not in ['Home', 'Sleeping'] }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.living_room_ac_2

        # Wake time: comfort preset + heat/cool decision
        - conditions:
            - condition: trigger
              id: wake_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                preset_mode: comfort
            - choose:
                - conditions:
                    - condition: numeric_state
                      entity_id: sensor.living_room_thermal_comfort_humidex
                      below: 19
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: numeric_state
                      entity_id: sensor.living_room_thermal_comfort_humidex
                      above: 23
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
                - conditions:
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: input_select.climate_season
                          state: winter
                        - condition: state
                          entity_id: input_select.climate_season
                          state: autumn
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: input_select.climate_season
                          state: summer
                        - condition: state
                          entity_id: input_select.climate_season
                          state: spring
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
              default:
                - action: climate.set_hvac_mode
                  target:
                    entity_id: climate.living_room_ac_2
                  data:
                    hvac_mode: "off"

        # Bed time: frost/boost if sleeping, off if just home
        - conditions:
            - condition: trigger
              id: bed_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: numeric_state
                      entity_id: sensor.living_room_thermal_comfort_humidex
                      below: 19
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: numeric_state
                      entity_id: sensor.living_room_thermal_comfort_humidex
                      above: 23
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: input_select.climate_season
                          state: winter
                        - condition: state
                          entity_id: input_select.climate_season
                          state: autumn
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
              default:
                - action: climate.turn_off
                  target:
                    entity_id: climate.living_room_ac_2
  mode: single

# ============================================================================
# MASTER BEDROOM - Comfort at wake, frost/boost at bedtime (if sleeping)
