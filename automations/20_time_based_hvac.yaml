            - action: climate.set_hvac_mode
              target:
                entity_id: climate.rumpus_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.turn_off
          target:
            entity_id: climate.rumpus_ac
  mode: single

- id: rumpus_away_mode
  alias: "HVAC - Rumpus - Occupancy On"
  description: "Turn Rumpus on when arriving to Home/Sleeping."
  triggers:
