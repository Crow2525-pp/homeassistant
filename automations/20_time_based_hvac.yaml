---
# ============================================================================
# TIME-BASED HVAC AUTOMATIONS
# ============================================================================
# This file implements per-room climate control based on occupancy plus
# room-specific wake/bed schedules.
#
# Logic:
# - Gates: occupancy must be Home or Sleeping
# - Scheduled wake/bed transitions auto-clear manual overrides where used
# - Bed time triggers then apply the overnight mode
# - Living room daytime control is occupancy-driven; early-morning heat still
#   comes from the separate preheat automation
# - Bed time (bedrooms): always heat or cool — AC stays on all night
#     Cold / Cool → frost+heat; everything else → boost+cool (favor cooling)
# - Bed time (living/communal): frost/boost if cold/hot; off if comfortable
#
# Heat/cool thresholds vary by room and time of day.
# See each automation below for the exact Cold/Cool/Slightly Cool handling.
# The master bedroom intentionally remains the warmest profile.
#
# The Indoor Comfort TS sensor uses ASHRAE 55 PMV calculations which factor in
# air temperature, humidity, clothing insulation, and metabolic rate — giving a
# more accurate comfort assessment than the simpler Summer Simmer Index.
#
# DEPENDENCY: Indoor Thermal Comfort integration (UI-configured, not YAML).
# The sensor entities below are created by this integration and exist in the
# live HA instance but are not version-controlled. If missing, automations
# will fail safe (no action on unknown/unavailable sensor states).
#
# Sensor sources (all Indoor Comfort Thermal Sensation):
# - Living Room:    sensor.living_room_thermal_comfort_ts
# - Rumpus:         sensor.rumpus_indoor_comfort_ts
# - Master Bedroom: sensor.master_bedroom_indoor_comfort_ts
# - Kids Room:      sensor.kids_room_indoor_comfort_ts
# - Study Room:     sensor.study_room_indoor_comfort_ts
#
# Room naming (alias → entity):
# - Living Room:    communal space (also turns on when arriving home)
# - Rumpus:         communal space (also turns on when arriving home) [climate.rumpus_ac]
# - Master Bedroom: Steph & Phil
# - Kids Room:      Henry & Otto [climate.kids_room_ac]
# - Study Room:     Lucas [climate.study_room_ac] — currently disabled
#
# Related files:
# - 16_master_bedroom_morning_comfort.yaml: humidity control only
# - 12_morning_preheat.yaml: superseded; preheat reinstated as living_room_preheat_530am
# ============================================================================

# ============================================================================
# LIVING ROOM - Occupancy on, bedtime off
# ============================================================================

- id: living_room_time_based_comfort
  alias: "HVAC - Living Room - Occupancy / Bedtime"
  description: >
    Turn the living room AC on when occupancy returns to Home. At bed time,
    turn the living room AC off for the night. The separate
    living_room_preheat_530am automation still handles early-morning pre-heat.
    Bedtime still auto-clears the manual override.
  trigger:
    - trigger: state
      entity_id: input_select.occupancy
      id: occupancy_change
    - trigger: time
      at: input_datetime.bedtime_living_room
      id: bed_time
  action:
    - choose:
        # Occupancy change: turn on when arriving home from Away or Holiday only.
        # Sleeping → Home is excluded: the preheat handles pre-wake comfort and
        # occupancy_hvac_exit_sleeping previously caused a conflicting OFF command.
        - conditions:
            - condition: trigger
              id: occupancy_change
            - condition: state
              entity_id: input_select.occupancy
              state: Home
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state in ['Away', 'Holiday'] }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.living_room_ac_2

        # Bed time: auto-clear override, then turn off overnight.
        # Early-morning heat is handled separately by living_room_preheat_530am.
        - conditions:
            - condition: trigger
              id: bed_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_living
            - action: climate.turn_off
              target:
                entity_id: climate.living_room_ac_2
  mode: single

# ============================================================================
# MASTER BEDROOM - Off at wake, frost/boost at bedtime (if sleeping)
# ============================================================================

- id: master_bedroom_time_based_day
  alias: "HVAC - Master Bedroom - Wake Up (Off)"
  description: >
    At wake time, auto-clear manual override and turn the AC off so the
    overnight cycle ends deterministically. Daytime HVAC stays off until a
    later occupancy-driven or bedtime path turns it back on again.
  trigger:
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wake_time
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  action:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_manual_control_master
    - action: climate.turn_off
      target:
        entity_id: climate.masterbed_room_ac
  mode: single
- id: master_bedroom_time_based_night
  alias: "HVAC - Master Bedroom - Bedtime"
  description: >
    At bedtime, auto-clear manual override and apply the selected bedroom HVAC mode.
    User selects Heat/Cool/Auto/Off via input_select.bedtime_hvac_mode.
    Heat → frost+heat, Cool → boost+cool, Auto → comfort-sensor fallback, Off → turn off.
    If sensor is unknown/unavailable in Auto mode, no action (fail safe).
  trigger:
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  action:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_manual_control_master
    - choose:
        # --- User forced Off ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: "Off"
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.masterbed_room_ac
        # --- User forced Heat ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Heat
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # --- User forced Cool ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        # --- Auto: fall back to comfort sensor ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Auto
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Auto
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Cool
                - Neutral
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      # Default case: Auto + sensor unknown/unavailable — no action (fail safe)
      default: []
  mode: single

- id: master_bedroom_away_mode
  alias: "HVAC - Master Bedroom - Occupancy On"
  description: "Turn master bedroom on when arriving to Home/Sleeping."
  trigger:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  condition:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
  action:
    - action: climate.turn_on
      target:
        entity_id: climate.masterbed_room_ac
  mode: single

- id: master_bedroom_workday_wfh_daytime_comfort
  alias: "HVAC - Master Bedroom - WFH Daytime Comfort"
  description: >
    Keeps the master bedroom comfortable while working from home. Activates
    when WFH begins (PC / desk turns on) and reacts to thermal comfort
    changes. Cold/Cool/Slightly Cool → heat + comfort, Slightly Warm/Warm/Hot
    → cool + comfort, Neutral → AC off. Turns off when WFH ends.
  trigger:
    - trigger: state
      entity_id: binary_sensor.working_from_home
      to: "on"
      id: wfh_start
    - trigger: state
      entity_id: binary_sensor.working_from_home
      to: "off"
      id: wfh_end
    - trigger: state
      entity_id: sensor.master_bedroom_indoor_comfort_ts
      to:
        - Cold
        - Cool
        - Slightly Cool
        - Slightly Warm
        - Warm
        - Hot
      for: "00:10:00"
      id: discomfort_stable
    - trigger: state
      entity_id: sensor.master_bedroom_indoor_comfort_ts
      to: Neutral
      for: "00:15:00"
      id: neutral_stable
  condition:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.master_bedroom_indoor_comfort_ts
          state:
            - unknown
            - unavailable
    - condition: template
      value_template: >
        {% set bed = states('input_datetime.bedtime_master_bedroom') %}
        {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
        {{ not (now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake) }}
  action:
    - choose:
        # --- WFH ended → turn off ---
        - conditions:
            - condition: trigger
              id: wfh_end
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.masterbed_room_ac
        # --- WFH active: Cold/Cool/Slightly Cool → heat + comfort ---
        - conditions:
            - condition: state
              entity_id: binary_sensor.working_from_home
              state: "on"
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
                - Slightly Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: comfort
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # --- WFH active: Slightly Warm/Warm/Hot → cool + comfort ---
        - conditions:
            - condition: state
              entity_id: binary_sensor.working_from_home
              state: "on"
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: comfort
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        # --- WFH active: Neutral → turn off ---
        - conditions:
            - condition: state
              entity_id: binary_sensor.working_from_home
              state: "on"
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state: Neutral
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.masterbed_room_ac
  mode: restart

