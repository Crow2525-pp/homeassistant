# ============================================================================
# STUDY ROOM - guest kid room
# Runs only when Guest Staying is on and follows the kids room schedule so the
# study behaves like a guest/kid bedroom without changing the base room helpers.
# ============================================================================

- id: lucas_room_time_based_night
  alias: "HVAC - Study Room - Bedtime"
  description: >
    When Guest Staying is on, the study follows the kids bedtime so it behaves
    like a guest/kid bedroom. At bedtime, auto-clear manual override and apply
    the selected bedroom HVAC mode. User selects Heat/Cool/Auto/Off via
    input_select.bedtime_hvac_mode. Auto → comfort-sensor fallback, Off → turn off.
    If sensor is unknown/unavailable in Auto mode, no action (fail safe).
  trigger:
    - trigger: time
      at: input_datetime.bedtime_ottos_room
      id: bed_time
  condition:
    - condition: state
      entity_id: input_boolean.study_occupied
      state: "on"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  action:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_manual_control_study
    - choose:
        # --- User forced Off ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: "Off"
          sequence:
            - action: climate.turn_off
              target:
                entity_id: climate.study_room_ac
        # --- User forced Heat ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Heat
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.study_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.study_room_ac
              data:
                hvac_mode: heat
        # --- User forced Cool ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.study_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.study_room_ac
              data:
                hvac_mode: cool
        # --- Auto: fall back to comfort sensor ---
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Auto
            - condition: state
              entity_id: sensor.study_room_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.study_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.study_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: input_select.bedtime_hvac_mode
              state: Auto
            - condition: state
              entity_id: sensor.study_room_indoor_comfort_ts
              state:
                - Slightly Cool
                - Neutral
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.study_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.study_room_ac
              data:
                hvac_mode: cool
      # Default case: Auto + sensor unknown/unavailable — no action (fail safe)
      default: []
  mode: single

- id: lucas_room_away_mode
  alias: "HVAC - Study Room - Occupancy On"
  description: >
    Turn Study Room on when arriving to Home/Sleeping during guest stays, but
    only at night (study has no daytime HVAC).
  trigger:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  condition:
    - condition: state
      entity_id: input_boolean.climate_manual_control_study
      state: "off"
    - condition: state
      entity_id: input_boolean.study_occupied
      state: "on"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
    # Only turn on at night — study has no daytime HVAC
    - condition: template
      value_template: >
        {% set bed = states('input_datetime.bedtime_ottos_room') %}
        {% set wake = states('input_datetime.wakeup_time_ottos_room') %}
        {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
  action:
    - action: climate.turn_on
      target:
        entity_id: climate.study_room_ac
  mode: single

# ============================================================================
# RUMPUS - communal space, or adult guest room when Guest Staying is on
# ============================================================================

- id: rumpus_time_based_night
  alias: "HVAC - Rumpus - Bedtime"
  description: >
    Uses the rumpus bedtime normally. When Guest Staying is on, it follows the
    master bedroom bedtime so the rumpus behaves like an adult guest room.
    User selects Heat/Cool/Auto/Off via input_select.bedtime_hvac_mode.
    Auto → comfort-sensor fallback, Off → turn off. If sensor is unknown/unavailable
    in Auto mode, no action (fail safe).
  trigger:
    - trigger: time
      at: input_datetime.bedtime_rumpus
      id: bed_time
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: guest_bed_time
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  action:
    - choose:
        # === Guest staying: follow master bedroom bedtime ===
        - conditions:
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "on"
            - condition: trigger
              id: guest_bed_time
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_rumpus
            - choose:
                # --- User forced Off ---
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: "Off"
                  sequence:
                    - action: climate.turn_off
                      target:
                        entity_id: climate.rumpus_ac
                # --- User forced Heat ---
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Heat
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
                # --- User forced Cool ---
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: cool
                # --- Auto: fall back to comfort sensor ---
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Auto
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state:
                        - Cold
                        - Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Auto
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state:
                        - Slightly Cool
                        - Neutral
                        - Slightly Warm
                        - Warm
                        - Hot
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: cool
        # === No guest: normal rumpus bedtime ===
        - conditions:
            - condition: state
              entity_id: input_boolean.study_occupied
              state: "off"
            - condition: trigger
              id: bed_time
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_manual_control_rumpus
            - choose:
                # --- User forced Heat (only when Sleeping) ---
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Heat
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
                # --- User forced Cool (only when Sleeping) ---
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: cool
                # --- Auto: fall back to comfort sensor (only when Sleeping + Cold/Cool) ---
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: input_select.bedtime_hvac_mode
                      state: Auto
                    - condition: state
                      entity_id: sensor.rumpus_indoor_comfort_ts
                      state:
                        - Cold
                        - Cool
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.rumpus_ac
                      data:
                        hvac_mode: heat
              default:
                - action: climate.turn_off
                  target:
                    entity_id: climate.rumpus_ac
  mode: single

- id: rumpus_away_mode
  alias: "HVAC - Rumpus - Occupancy On"
  description: >
    Turn Rumpus on when arriving to Home/Sleeping, but only during the active
    nighttime schedule.
  trigger:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  condition:
    - condition: state
      entity_id: input_boolean.climate_manual_control_rumpus
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
    - condition: template
      value_template: >
        {% if is_state('input_boolean.study_occupied', 'on') %}
          {% set bed = states('input_datetime.bedtime_master_bedroom') %}
          {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
        {% else %}
          {% set bed = states('input_datetime.bedtime_rumpus') %}
          {% set wake = states('input_datetime.wakeup_time_rumpus') %}
        {% endif %}
        {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
    # Only turn on if the room actually needs heating or cooling.
    - condition: state
      entity_id: sensor.rumpus_indoor_comfort_ts
      state:
        - Cold
        - Cool
        - Slightly Warm
        - Warm
        - Hot
  action:
    - action: climate.turn_on
      target:
        entity_id: climate.rumpus_ac
  mode: single

# ============================================================================
# LIVING ROOM - Pre-heat if cold (configurable time, pre-wake comfort boost)
# Adjust input_datetime.preheat_time_living_room earlier as winter deepens.
# ============================================================================

- id: living_room_preheat_530am
  alias: "HVAC - Living Room - Pre-heat if Cold (Configurable Time)"
  description: >
    At the configured pre-heat time (input_datetime.preheat_time_living_room,
    default 05:30), if the living room feels cold (Indoor Comfort TS is Cold
    or Cool), auto-clear manual override and set comfort preset + heat so the
    room is warm before wake time.
  trigger:
    - trigger: time
      at: input_datetime.preheat_time_living_room
  condition:
    - condition: state
      entity_id: sensor.living_room_thermal_comfort_ts
      state:
        - Cold
        - Cool
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  action:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_manual_control_living
    - action: climate.set_preset_mode
      target:
        entity_id: climate.living_room_ac_2
      data:
        preset_mode: comfort
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.living_room_ac_2
      data:
        hvac_mode: heat
  mode: single
