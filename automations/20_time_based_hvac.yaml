# ============================================================================
# LIVING ROOM - Pre-heat at 5:30 AM if cold (pre-wake comfort boost)
# ============================================================================

- id: living_room_preheat_530am
  alias: "HVAC - Living Room - Pre-heat at 5:30 AM if Cold"
  description: >
    At 5:30 AM, if the living room feels cold (summer_simmer_perception is cool
    or outside_calculable_range) and it's not a super-hot day, set comfort preset
    + heat so the room is warm before wake time.
    Gates on manual override off and someone being home/sleeping.
  triggers:
    - trigger: time
      at: "05:30:00"
  conditions:
    - condition: state
      entity_id: sensor.living_room_thermal_comfort_summer_simmer_perception
      state:
        - cool
        - outside_calculable_range
    - condition: state
      entity_id: input_boolean.super_hot_today
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.living_room_ac_2
      data:
        preset_mode: comfort
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.living_room_ac_2
      data:
        hvac_mode: heat
  mode: single
