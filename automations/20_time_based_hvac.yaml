        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.living_room_ac_2
          state: "off"
  actions:
    - choose:
        - conditions:
            - condition: numeric_state
              entity_id: sensor.living_room_thermal_comfort_humidex
              below: 19
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: heat
        - conditions:
            - condition: numeric_state
              entity_id: sensor.living_room_thermal_comfort_humidex
              above: 23
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: cool
        - conditions:
            - condition: or
              conditions:
