      target:
        entity_id: climate.masterbed_room_ac
      data:
        preset_mode: comfort
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
  mode: single

- id: master_bedroom_time_based_night
  alias: "HVAC - Master Bedroom - Bedtime"
  description: >
    At bedtime, if sleeping or home: frost+heat if cold, boost+cool if hot,
    off if comfortable. Turn off only if away/holiday.
  triggers:
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.turn_off
          target:
            entity_id: climate.masterbed_room_ac
  mode: single

- id: master_bedroom_away_mode
  alias: "HVAC - Master Bedroom - Occupancy On"
  description: "Turn master bedroom on when arriving to Home/Sleeping."
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.masterbed_room_ac
  mode: single

