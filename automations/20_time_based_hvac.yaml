# ============================================================================
# HALF-HOURLY MODE RE-CHECK
# ============================================================================
# Triggers:
#   1. Every 30 minutes (time_pattern) — if AC is already running, re-evaluate
#      heat vs cool based on current Indoor Comfort thermal sensation (ASHRAE 55).
#   2. Occupancy changes to Home or Sleeping from Away/Holiday — immediately
#      set the correct hvac_mode after return-home turn-on.
#
# Only the hvac_mode is updated; preset is unchanged (except bedrooms at night).
# In the Slightly Cool/Neutral zone, the AC is turned off (daytime only for
# bedrooms).
# ============================================================================

- id: living_room_hourly_recheck
  alias: "HVAC - Living Room - Half-Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "/30"
      id: time_trigger
    - trigger: state
      entity_id: input_select.occupancy
      to: Home
      id: occupancy_change
    - trigger: state
      entity_id: input_select.occupancy
      to: Sleeping
      id: occupancy_change
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: or
      conditions:
        # Occupancy change: skip AC-state check — AC was just turned on by return-home
        # Only act when transitioning from Away or Holiday
        - condition: and
          conditions:
            - condition: trigger
              id: occupancy_change
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state in ['Away', 'Holiday'] }}
        # Time trigger: only re-check if AC is already running
        - condition: not
          conditions:
            - condition: state
              entity_id: climate.living_room_ac_2
              state: "off"
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.living_room_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: sensor.living_room_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                hvac_mode: cool
      default:
        # Slightly Cool / Neutral — room is fine, stop the AC
        - action: climate.turn_off
          target:
            entity_id: climate.living_room_ac_2
  mode: single

- id: master_bedroom_hourly_recheck
  alias: "HVAC - Master Bedroom - Half-Hourly Mode Re-check"
  triggers:
    - trigger: time_pattern
      minutes: "/30"
      id: time_trigger
    - trigger: state
      entity_id: input_select.occupancy
      to: Home
      id: occupancy_change
    - trigger: state
      entity_id: input_select.occupancy
      to: Sleeping
      id: occupancy_change
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
    - condition: or
      conditions:
        # Occupancy change: skip AC-state check — AC was just turned on by return-home
        # Only act when transitioning from Away or Holiday
        - condition: and
          conditions:
            - condition: trigger
              id: occupancy_change
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state in ['Away', 'Holiday'] }}
        # Time trigger: only re-check if AC is already running
        - condition: not
          conditions:
            - condition: state
              entity_id: climate.masterbed_room_ac
              state: "off"
    # Fail safe: skip if sensor is unknown/unavailable
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.master_bedroom_indoor_comfort_ts
          state:
            - unknown
            - unavailable
  actions:
    - variables:
        is_nighttime: >
          {% set bed = states('input_datetime.bedtime_master_bedroom') %}
          {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
          {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
    - choose:
        # Cold/Cool → heat (night: frost preset; day: no preset change)
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Cold
                - Cool
          sequence:
            - if:
                - condition: template
                  value_template: "{{ is_nighttime }}"
              then:
                - action: climate.set_preset_mode
                  target:
                    entity_id: climate.masterbed_room_ac
                  data:
                    preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        # Slightly Warm+ → cool (night: boost preset; day: no preset change)
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Warm
                - Warm
                - Hot
          sequence:
            - if:
                - condition: template
                  value_template: "{{ is_nighttime }}"
              then:
                - action: climate.set_preset_mode
                  target:
                    entity_id: climate.masterbed_room_ac
                  data:
                    preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        # Slightly Cool / Neutral — comfortable zone
        - conditions:
            - condition: state
              entity_id: sensor.master_bedroom_indoor_comfort_ts
              state:
                - Slightly Cool
                - Neutral
          sequence:
            - choose:
                # Night: favor cool, never turn off
                - conditions:
                    - condition: template
                      value_template: "{{ is_nighttime }}"
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.masterbed_room_ac
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.masterbed_room_ac
                      data:
                        hvac_mode: cool
              default:
                # Day: room is comfortable, turn off
                - action: climate.turn_off
                  target:
                    entity_id: climate.masterbed_room_ac
      # default: unexpected sensor state — no action (fail safe)
  mode: single

