---
# ============================================================================
# TIME-BASED HVAC AUTOMATIONS
# ============================================================================
# This file implements per-room climate control based on wake/bed times.
#
# Logic:
# - Gates: manual override off; occupancy must be Home or Sleeping
# - Wake time: comfort preset; heat/cool decided by FELT temperature (summer simmer perception)
# - Bed time (Sleeping): frost (heat) or boost (cool) based on simmer perception/season
# - Bed time (Home, not sleeping): off
#
# Heat/cool decision order (same for all rooms):
#   1. summer_simmer_perception == cool/outside_calculable_range
#                              → heat  (feels cold, SSI < 21.1°C or below valid range)
#   2. summer_simmer_perception in [slightly_warm, increasing_discomfort, ...]
#                              → cool  (feels warm, SSI ≥ 28.3°C)
#   3. Season winter/autumn    → heat  (moderate feel, cold-bias season)
#   4. Season summer/spring    → cool  (moderate feel, warm-bias season)
#   5. Default                 → off   (no match)
#
# WHY SUMMER SIMMER PERCEPTION INSTEAD OF NUMERIC HUMIDEX:
# The summer_simmer_perception sensor expresses calibrated human comfort
# categories based on both temperature and humidity. Using categorical states
# like "cool", "slightly_cool", "comfortable", "slightly_warm" makes the
# heat/cool boundary explicit and human-readable, while still fully accounting
# for humidity. "outside_calculable_range" (SSI < 14°C) is treated as "cool"
# so very cold rooms always trigger heating.
#
# Perception state thresholds (Summer Simmer Index):
#   cool                         < 21.1°C  → heat
#   slightly_cool            21.1–24.9°C  → season-based fallback
#   comfortable              25.0–28.2°C  → season-based fallback
#   slightly_warm            28.3–32.7°C  → cool
#   increasing_discomfort    32.8–37.7°C  → cool
#   extremely_warm           37.8–44.3°C  → cool
#   danger_of_heatstroke     44.4–51.6°C  → cool
#   extreme_danger_of_heatstroke 51.7–65.5°C → cool
#   circulatory_collapse_imminent ≥ 65.6°C  → cool
#   outside_calculable_range     < 14°C   → heat
#
# Sensor sources (all INDOOR summer simmer perception):
# - Living Room:    sensor.living_room_thermal_comfort_summer_simmer_perception
# - Rumpus:         sensor.rumpus_thermal_comfort_summer_simmer_perception
# - Master Bedroom: sensor.thermal_comfort_summer_simmer_perception
# - Kids Room:      sensor.kids_room_thermal_comfort_summer_simmer_perception
# - Study Room:     sensor.study_room_thermal_comfort_summer_simmer_perception
#
# Room naming (alias → entity):
# - Living Room:    communal space (also turns on when arriving home)
# - Rumpus:         communal space (also turns on when arriving home) [climate.rumpus_ac]
# - Master Bedroom: Steph & Phil
# - Kids Room:      Henry & Otto [climate.kids_room_ac]
# - Study Room:     Lucas [climate.study_room_ac]
#
# Related files:
# - 16_master_bedroom_morning_comfort.yaml: humidity control only
#   (morning-comfort and exit automations in that file are superseded by
#    master_bedroom_time_based_day / master_bedroom_time_based_night here)
# - 12_morning_preheat.yaml: superseded; preheat reinstated as living_room_preheat_530am
# ============================================================================

# ============================================================================
# LIVING ROOM - Comfort at wake, frost/boost at bedtime (if sleeping), off otherwise
# ============================================================================

- id: living_room_time_based_comfort
  alias: "HVAC - Living Room - Comfort (Wake/Bed Time)"
  description: >
    At wake time, set comfort preset and decide heat/cool mode based on indoor
    summer simmer perception. At bed time, set frost+heat or boost+cool if
    sleeping, or turn off if just home. Also turns the AC on when arriving home.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      id: occupancy_change
    - trigger: time
      at: input_datetime.wakeup_time_living_room
      id: wake_time
    - trigger: time
      at: input_datetime.bedtime_living_room
      id: bed_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_living
      state: "off"
  actions:
    - choose:
        # Occupancy change: turn on when arriving home/sleeping from away
        - conditions:
            - condition: trigger
              id: occupancy_change
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
            - condition: template
              value_template: >
                {{ trigger.from_state is not none
                   and trigger.from_state.state not in ['Home', 'Sleeping'] }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.living_room_ac_2

        # Wake time: comfort preset + heat/cool decision
        - conditions:
            - condition: trigger
              id: wake_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.living_room_ac_2
              data:
                preset_mode: comfort
            - choose:
                - conditions:
                    - condition: state
                      entity_id: sensor.living_room_thermal_comfort_summer_simmer_perception
                      state:
                        - cool
                        - outside_calculable_range
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: sensor.living_room_thermal_comfort_summer_simmer_perception
                      state:
                        - slightly_warm
                        - increasing_discomfort
                        - extremely_warm
                        - danger_of_heatstroke
                        - extreme_danger_of_heatstroke
                        - circulatory_collapse_imminent
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
                - conditions:
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: input_select.climate_season
                          state: winter
                        - condition: state
                          entity_id: input_select.climate_season
                          state: autumn
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: input_select.climate_season
                          state: summer
                        - condition: state
                          entity_id: input_select.climate_season
                          state: spring
                  sequence:
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
              default:
                - action: climate.set_hvac_mode
                  target:
                    entity_id: climate.living_room_ac_2
                  data:
                    hvac_mode: "off"

        # Bed time: frost/boost if sleeping, off if just home
        - conditions:
            - condition: trigger
              id: bed_time
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
          sequence:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: sensor.living_room_thermal_comfort_summer_simmer_perception
                      state:
                        - cool
                        - outside_calculable_range
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: state
                      entity_id: sensor.living_room_thermal_comfort_summer_simmer_perception
                      state:
                        - slightly_warm
                        - increasing_discomfort
                        - extremely_warm
                        - danger_of_heatstroke
                        - extreme_danger_of_heatstroke
                        - circulatory_collapse_imminent
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: input_select.climate_season
                          state: winter
                        - condition: state
                          entity_id: input_select.climate_season
                          state: autumn
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: frost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: heat
                - conditions:
                    - condition: state
                      entity_id: input_select.occupancy
                      state: Sleeping
                  sequence:
                    - action: climate.set_preset_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        preset_mode: boost
                    - action: climate.set_hvac_mode
                      target:
                        entity_id: climate.living_room_ac_2
                      data:
                        hvac_mode: cool
              default:
                - action: climate.turn_off
                  target:
                    entity_id: climate.living_room_ac_2
  mode: single

# ============================================================================
# MASTER BEDROOM - Comfort at wake, frost/boost at bedtime (if sleeping)
# ============================================================================

- id: master_bedroom_time_based_day
  alias: "HVAC - Master Bedroom - Wake Up Comfort"
  description: >
    At wake time, set comfort preset and decide heat/cool based on indoor
    summer simmer perception. Uses sensor.thermal_comfort_summer_simmer_perception
    which accounts for room humidity (cool/out-of-range → heat, slightly_warm+ → cool,
    otherwise season-based).
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wake_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.masterbed_room_ac
      data:
        preset_mode: comfort
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.thermal_comfort_summer_simmer_perception
              state:
                - cool
                - outside_calculable_range
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: state
              entity_id: sensor.thermal_comfort_summer_simmer_perception
              state:
                - slightly_warm
                - increasing_discomfort
                - extremely_warm
                - danger_of_heatstroke
                - extreme_danger_of_heatstroke
                - circulatory_collapse_imminent
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: summer
                - condition: state
                  entity_id: input_select.climate_season
                  state: spring
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.masterbed_room_ac
          data:
            hvac_mode: "off"
  mode: single

- id: master_bedroom_time_based_night
  alias: "HVAC - Master Bedroom - Bedtime"
  description: >
    At bedtime, if sleeping or home (someone still awake): set frost+heat or
    boost+cool based on indoor summer simmer perception and season. Turn off only
    if away/holiday.
  triggers:
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
  conditions:
    - condition: state
      entity_id: input_boolean.climate_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Home
        - condition: state
          entity_id: input_select.occupancy
          state: Sleeping
  actions:
    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
            - condition: state
              entity_id: sensor.thermal_comfort_summer_simmer_perception
              state:
                - cool
                - outside_calculable_range
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
            - condition: state
              entity_id: sensor.thermal_comfort_summer_simmer_perception
              state:
                - slightly_warm
                - increasing_discomfort
                - extremely_warm
                - danger_of_heatstroke
                - extreme_danger_of_heatstroke
                - circulatory_collapse_imminent
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.climate_season
                  state: winter
                - condition: state
                  entity_id: input_select.climate_season
                  state: autumn
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: frost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: heat
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_select.occupancy
                  state: Sleeping
                - condition: state
                  entity_id: input_select.occupancy
                  state: Home
          sequence:
            - action: climate.set_preset_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                preset_mode: boost
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.masterbed_room_ac
              data:
                hvac_mode: cool
      default:
        - action: climate.turn_off
          target:
            entity_id: climate.masterbed_room_ac
  mode: single

- id: master_bedroom_away_mode
  alias: "HVAC - Master Bedroom - Occupancy On"
  description: "Turn master bedroom on when arriving to Home/Sleeping."
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: home
  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['Home', 'Sleeping'] }}
  actions:
    - action: climate.turn_on
      target:
        entity_id: climate.masterbed_room_ac
  mode: single

