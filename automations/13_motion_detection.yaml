---
# ============================================================================
# FRIGATE PERSON DETECTION AUTOMATIONS
# ============================================================================
# Purpose: Alert on relevant person detections from Frigate without duplicate spam.
# ============================================================================

- id: front_door_frigate_person_detection
  alias: Front Door - Frigate Person Detection
  description: Sends a high-priority notification when Frigate detects a person at the front door during security-relevant periods.
  trigger:
    - trigger: state
      entity_id: binary_sensor.front_door_person_occupancy
      to: "on"
      for:
        seconds: 2
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state:
            - Away
            - Sleeping
        - condition: time
          after: "20:00:00"
        - condition: time
          before: "06:00:00"
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: alarm_control_panel.alarmo
              state:
                - armed_away
                - armed_night
          sequence:
            - action: notify.std_critical
              data:
                title: Front Door Person Detected
                message: Frigate detected a person at the front door while Alarmo is armed.
                data:
                  image: /api/camera_proxy/camera.front_door
                  clickAction: /lovelace/security
                  tag: frigate_front_door_person
                  ttl: 0
                  priority: high
      default:
        - action: notify.family_mobile
          data:
            title: Front Door Person Detected
            message: Frigate detected a person at the front door.
            data:
              image: /api/camera_proxy/camera.front_door
              clickAction: /lovelace/security
              tag: frigate_front_door_person
              ttl: 0
              priority: high
    - delay:
        minutes: 15
  mode: single
  max_exceeded: silent

