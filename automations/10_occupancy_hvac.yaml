---
# ============================================================================
# OCCUPANCY-BASED HVAC & MEDIA AUTOMATIONS
# ============================================================================
# Automatically turns all climate/HVAC entities on or off based on the
# occupancy selector (input_select.occupancy). Also shuts off living-room
# media devices (WiiM amp, TV) when away — unless guest mode is active.
#
# Away / Holiday → turn off ALL climate entities (energy saving)
#                → turn off living-room media (unless guest mode is on)
# Home / Sleeping (returning from Away or Holiday) → turn on active rooms only
#   per-room, respecting each room's manual override flag.
#
# Active rooms (return-home turn-on):
#   Living Room   : climate.living_room_ac_2, climate.living_room_versatile_thermostat
#   Master Bedroom: climate.masterbed_room_ac, climate.masterbed_versatile_thermostat
#   Kids/Otto Room: climate.kids_room_ac, climate.otto_s_room
#   Rumpus        : via rumpus_away_mode in 20_time_based_hvac.yaml (not listed below)
#
# Disabled rooms (away shutdown only — NOT turned on at return-home):
#   Study/Lucas   : climate.study_room_ac, climate.henry_s_room_versatile_thermostat
#
# Notes:
#   - Away shutdown includes all rooms regardless of disabled status (energy safety)
#   - Media shutoff respects guest mode (input_boolean.study_occupied)
#   - Return-home turn-on respects per-room manual override flags
#   - Time-based automations (20_time_based_hvac.yaml) handle preset/mode after power-on
# ============================================================================

# ----------------------------------------------------------------------------
# AWAY / HOLIDAY  →  Turn off all HVAC
# ----------------------------------------------------------------------------
- id: occupancy_hvac_away_shutdown
  alias: "Occupancy - HVAC Off When Away or Holiday"
  description: >
    Turns off every climate entity when the household becomes Away or goes on
    Holiday. No manual-override gate — energy safety takes priority.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to: Away
    - trigger: state
      entity_id: input_select.occupancy
      to: Holiday
  conditions: []
  actions:
    - action: climate.turn_off
      target:
        entity_id:
          - climate.living_room_ac_2
          - climate.living_room_versatile_thermostat
          - climate.masterbed_room_ac
          - climate.masterbed_versatile_thermostat
          - climate.kids_room_ac
          - climate.otto_s_room
          - climate.study_room_ac
          - climate.henry_s_room_versatile_thermostat
          - climate.rumpus_ac
    # Turn off living-room media devices only when guest mode is off
    - if:
        - condition: state
          entity_id: input_boolean.study_occupied
          state: "off"
      then:
        - action: media_player.turn_off
          target:
            entity_id: media_player.living_room_wiimamp
        - action: remote.turn_off
          target:
            entity_id: remote.sony_kd_55x8500c
  mode: single

# ----------------------------------------------------------------------------
# RETURN HOME / SLEEPING (from Away or Holiday)  →  Turn on HVAC per-room
# ----------------------------------------------------------------------------
- id: occupancy_hvac_return_home
  alias: "Occupancy - HVAC On When Returning Home"
  description: >
    Turns climate entities back on when occupancy changes from Away or Holiday
    to Home or Sleeping. Each room's manual override flag is respected — rooms
    under manual control are left untouched. The living room only resumes when
    occupancy returns to Home so Sleeping keeps it off overnight. Time-based
    automations then handle preset and mode selection.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to: Home
    - trigger: state
      entity_id: input_select.occupancy
      to: Sleeping
  conditions:
    # Only act when transitioning from Away or Holiday
    - condition: template
      value_template: >
        {{ trigger.from_state is not none and
           trigger.from_state.state in ['Away', 'Holiday'] }}
  actions:
    # Living Room
    - if:
        - condition: state
          entity_id: input_boolean.climate_manual_control_living
          state: "off"
        - condition: state
          entity_id: input_select.occupancy
          state: Home
      then:
        - action: climate.turn_on
          target:
            entity_id:
              - climate.living_room_ac_2
              - climate.living_room_versatile_thermostat

    # Master Bedroom
    - if:
        - condition: state
          entity_id: input_boolean.climate_manual_control_master
          state: "off"
      then:
        - action: climate.turn_on
          target:
            entity_id:
              - climate.masterbed_room_ac
              - climate.masterbed_versatile_thermostat

    # Kids / Otto's Room
    - if:
        - condition: state
          entity_id: input_boolean.climate_manual_control_otto
          state: "off"
      then:
        - action: climate.turn_on
          target:
            entity_id:
              - climate.kids_room_ac
              - climate.otto_s_room

    # Study intentionally omitted — disabled room not turned on at return-home.
    # Rumpus handled by rumpus_away_mode in 20_time_based_hvac.yaml.
    # Away shutdown above still turns all rooms off for energy safety.
  mode: single
