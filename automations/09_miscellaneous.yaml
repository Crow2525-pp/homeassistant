---
- id: master_bedroom_fan_climate_control
  alias: HVAC - Master Bedroom Fan Sync with Climate
  description: >
    Syncs the master bedroom ceiling fan with the AC (climate.masterbed_room_ac).

    Fan speed scaling (based on current temp minus target temp):
      <= 1°  → 16%  (lowest)
      <= 2°  → 33%
      <= 3°  → 50%
      >  3°  → 66%
    Speed updates live as temperatures change.

    Overnight behaviour (bedtime → wakeup):
      - If the AC is cooling at bedtime and the fan is off, the fan starts at
        the scaled speed above.
      - If the AC cycles off (or switches to heat) during the night, the fan
        drops to 16% instead of turning off, keeping airflow until morning.
      - At wakeup the fan turns off — unless the AC is still actively cooling,
        in which case normal daytime speed-scaling takes over.

    Daytime behaviour:
      - Fan tracks cooling speed while AC is in cool mode.
      - Fan turns off when AC switches to heat or off.

    Manual override:
      - When input_boolean.fan_manual_control_master is on, this automation is
        blocked. When it is turned back off, the fan re-syncs to the current
        AC state.

    Note: The choose branches are evaluated in order. The overnight
    cooling_stopped branch is checked before the daytime cooling_stopped
    branch so that nighttime gets priority.
  triggers:
    - trigger: state
      entity_id: climate.masterbed_room_ac
      to: cool
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      attribute: current_temperature
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      attribute: temperature
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      to:
        - heat
        - "off"
      id: cooling_stopped
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bedtime
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wakeup
    - trigger: state
      entity_id: input_boolean.fan_manual_control_master
      to: "off"
      id: manual_control_disabled
  conditions:
    - condition: state
      entity_id: input_boolean.fan_manual_control_master
      state: "off"
  actions:
    - choose:
        # Wakeup: turn fan off unless AC is actively cooling
        - conditions:
            - condition: trigger
              id: wakeup
            - condition: not
              conditions:
                - condition: state
                  entity_id: climate.masterbed_room_ac
                  state: cool
          sequence:
            - action: fan.turn_off
              target:
                entity_id: fan.masterbedroom_fan

        # AC cooling (or temp changed while cooling): scale fan speed
        - conditions:
            - condition: trigger
              id: cooling_active
            - condition: state
              entity_id: climate.masterbed_room_ac
              state: cool
          sequence:
            - action: fan.set_percentage
              target:
                entity_id: fan.masterbedroom_fan
              data:
                percentage: &fan_speed >
                  {% set current = state_attr('climate.masterbed_room_ac',
                  'current_temperature') %} {% set target =
                  state_attr('climate.masterbed_room_ac', 'temperature') %} {% if
                  current is number and target is number %}
                    {% set diff = current - target %}
                    {% if diff <= 1 %} 16
                    {% elif diff <= 2 %} 33
                    {% elif diff <= 3 %} 50
                    {% else %} 66
                    {% endif %}
                  {% else %} 16
                  {% endif %}

        # Overnight: AC stopped cooling → drop to low speed instead of off
        - conditions:
            - condition: trigger
              id: cooling_stopped
            - condition: time
              after: input_datetime.bedtime_master_bedroom
              before: input_datetime.wakeup_time_master_bedroom
          sequence:
            - action: fan.set_percentage
              target:
                entity_id: fan.masterbedroom_fan
              data:
                percentage: 16

        # Daytime: AC stopped cooling → turn fan off
        - conditions:
            - condition: trigger
              id: cooling_stopped
          sequence:
            - action: fan.turn_off
              target:
                entity_id: fan.masterbedroom_fan

        # Bedtime: if AC is cooling and fan is off, start the fan
        - conditions:
            - condition: trigger
              id: bedtime
            - condition: state
              entity_id: climate.masterbed_room_ac
              state: cool
            - condition: time
              after: input_datetime.bedtime_master_bedroom
              before: input_datetime.wakeup_time_master_bedroom
            - condition: state
              entity_id: fan.masterbedroom_fan
              state: "off"
          sequence:
            - action: fan.set_percentage
              target:
                entity_id: fan.masterbedroom_fan
              data:
                percentage: *fan_speed

        # Manual control re-disabled → re-sync to current AC state
        - conditions:
            - condition: trigger
              id: manual_control_disabled
          sequence:
            - if:
                - condition: state
                  entity_id: climate.masterbed_room_ac
                  state: cool
              then:
                - action: fan.set_percentage
                  target:
                    entity_id: fan.masterbedroom_fan
                  data:
                    percentage: *fan_speed
              else:
                - action: fan.turn_off
                  target:
                    entity_id: fan.masterbedroom_fan
  mode: restart
