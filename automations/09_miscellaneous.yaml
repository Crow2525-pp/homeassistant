---
####################################################################
# EOFY Work Location Report
#
# Sends a mobile notification on June 25 each year with WFH vs
# office day counts for the Australian financial year (Jul 1 – Jun 30).
# Data comes from utility_meter sensors that accumulate daily hours,
# converted to approximate day counts (÷ 9 hours/day).
####################################################################
- id: eofy_work_location_report
  alias: "Report - EOFY Work Location Summary"
  description: >
    Annual notification summarising WFH and office days for the
    Australian financial year, sent a few days before June 30 to
    allow time for any corrections. Note: FY 2025/2026 will be
    partial (tracking started April 2026). Full data from FY 2026/2027.
  triggers:
    - trigger: time
      at: "09:00:00"
  conditions:
    - condition: template
      value_template: "{{ now().month == 6 and now().day == 25 }}"
  actions:
    - variables:
        report_msg: >
          FY{{ (now().year - 1) }}/{{ now().year }} Work Location Summary (as at {{ now().strftime('%d %b %Y') }})

          WFH: {{ states('sensor.wfh_days_financial_year_count') }} days
          Office: {{ states('sensor.office_days_financial_year_count') }} days
          Total: {{ (states('sensor.wfh_days_financial_year_count') | float(0) + states('sensor.office_days_financial_year_count') | float(0)) | round(0) }} days

          Financial year ends June 30. Review for tax purposes.
    - action: notify.mobile_app_samsung_galaxy_s22_ultra
      data:
        title: "EOFY Work Location Report"
        message: "{{ report_msg }}"
        data:
          sticky: "true"
          channel: "Reports"
          importance: high
    - action: persistent_notification.create
      data:
        title: "EOFY Work Location Report"
        message: "{{ report_msg }}"
        notification_id: eofy_work_location_report
  mode: single

####################################################################
# EOFY Work Location Snapshot
#
# Saves the final financial year WFH/office day counts into
# input_number helpers on June 30 at 23:55, just before the
# utility meters reset on July 1.
####################################################################
- id: eofy_work_location_snapshot
  alias: "Report - EOFY Snapshot Previous Year"
  description: >
    Snapshots the financial year work location counts into input_number
    helpers before the utility meter resets on July 1.
  triggers:
    - trigger: time
      at: "23:55:00"
  conditions:
    - condition: template
      value_template: "{{ now().month == 6 and now().day == 30 }}"
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.prev_fy_wfh_days
      data:
        value: "{{ states('sensor.wfh_days_financial_year_count') | float(0) | round(0) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.prev_fy_office_days
      data:
        value: "{{ states('sensor.office_days_financial_year_count') | float(0) | round(0) }}"
  mode: single

####################################################################
# Master Bedroom Fan – Nighttime (bedtime → wakeup)
#
# Keeps the ceiling fan running overnight while the AC cools.
# If the AC cycles off during the night the fan drops to 16%
# instead of turning off, maintaining airflow until wakeup.
#
# Fan speed scaling (current temp minus target):
#   <= 1° → 16%  |  <= 2° → 33%  |  <= 3° → 50%  |  > 3° → 66%
####################################################################
- id: master_bedroom_fan_nighttime
  alias: HVAC - Master Bedroom Fan (Nighttime)
  description: >
    Overnight fan control for the master bedroom. While the AC is cooling,
    fan speed scales with the temperature difference. If the AC cycles off
    overnight the fan drops to 16% to keep airflow going. At wakeup the
    fan turns off unconditionally — daytime automation takes over.
  triggers:
    - trigger: state
      entity_id: climate.masterbed_room_ac
      to: cool
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      attribute: current_temperature
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      attribute: temperature
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      to:
        - heat
        - "off"
      id: cooling_stopped
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wakeup
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Holiday
    - condition: state
      entity_id: input_boolean.fan_manual_control_master
      state: "off"
    - condition: or
      conditions:
        - condition: time
          after: input_datetime.bedtime_master_bedroom
          before: input_datetime.wakeup_time_master_bedroom
        - condition: trigger
          id: wakeup
  actions:
    - choose:
        # Wakeup: turn fan off
        - conditions:
            - condition: trigger
              id: wakeup
          sequence:
            - action: fan.turn_off
              target:
                entity_id: fan.masterbedroom_fan
        # AC cooling: scale fan speed with temp difference
        - conditions:
            - condition: trigger
              id: cooling_active
            - condition: state
              entity_id: climate.masterbed_room_ac
              state: cool
          sequence:
            - action: fan.set_percentage
              target:
                entity_id: fan.masterbedroom_fan
              data:
                percentage: >
                  {% set current = state_attr('climate.masterbed_room_ac',
                  'current_temperature') %}
                  {% set target = state_attr('climate.masterbed_room_ac',
                  'temperature') %}
                  {% if current is number and target is number %}
                    {% set diff = current - target %}
                    {% if diff <= 1 %} 16
                    {% elif diff <= 2 %} 33
                    {% elif diff <= 3 %} 50
                    {% else %} 66
                    {% endif %}
                  {% else %} 16
                  {% endif %}
        # AC stopped cooling overnight: keep fan on at low speed
        - conditions:
            - condition: trigger
              id: cooling_stopped
          sequence:
            - action: fan.set_percentage
              target:
                entity_id: fan.masterbedroom_fan
              data:
                percentage: 16
  mode: restart

####################################################################
# Master Bedroom Fan – Daytime (wakeup → bedtime)
#
# Simple fan-follows-AC during the day. Fan scales with cooling,
# turns off 30 minutes after the AC stops (mode: restart cancels
# the delay if cooling resumes).
####################################################################
- id: master_bedroom_fan_daytime
  alias: HVAC - Master Bedroom Fan (Daytime)
  description: >
    Daytime fan control for the master bedroom. Fan speed scales with
    the cooling temperature difference while the AC is in cool mode.
    When the AC stops cooling the fan stays on for 30 minutes before
    turning off, in case the AC cycles back on.
  triggers:
    - trigger: state
      entity_id: climate.masterbed_room_ac
      to: cool
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      attribute: current_temperature
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      attribute: temperature
      id: cooling_active
    - trigger: state
      entity_id: climate.masterbed_room_ac
      to:
        - heat
        - "off"
      id: cooling_stopped
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.occupancy
          state: Holiday
    - condition: state
      entity_id: input_boolean.fan_manual_control_master
      state: "off"
    - condition: time
      after: input_datetime.wakeup_time_master_bedroom
      before: input_datetime.bedtime_master_bedroom
  actions:
    - if:
        - condition: state
          entity_id: climate.masterbed_room_ac
          state: cool
      then:
        - action: fan.set_percentage
          target:
            entity_id: fan.masterbedroom_fan
          data:
            percentage: >
              {% set current = state_attr('climate.masterbed_room_ac',
              'current_temperature') %}
              {% set target = state_attr('climate.masterbed_room_ac',
              'temperature') %}
              {% if current is number and target is number %}
                {% set diff = current - target %}
                {% if diff <= 1 %} 16
                {% elif diff <= 2 %} 33
                {% elif diff <= 3 %} 50
                {% else %} 66
                {% endif %}
              {% else %} 16
              {% endif %}
      else:
        - delay: "00:30:00"
        - action: fan.turn_off
          target:
            entity_id: fan.masterbedroom_fan
  mode: restart
