---
# ============================================================================
# GUEST DEVICE DETECTION
# ============================================================================
# Two-tier WiFi device detection via the UniFi integration:
#
# 1. UNKNOWN DEVICE - a UniFi tracker that is not labeled as a household
#    presence device, not labeled as a guest_wifi device, and not present in
#    the legacy safelisted_wifi_macs helper. Sends a rich notification (name,
#    MAC, IP, manufacturer) with options to safelist the device or activate
#    guest mode.
#
# 2. KNOWN GUEST DEVICE - a MAC in safelisted_wifi_macs that connects while
#    both Phil and Steph are away from home. Automatically activates guest
#    mode and notifies.
#
# To add a household device permanently: apply the 'presence' label to its
# device_tracker entity in Home Assistant.
#
# To safelist a guest device: preferably apply the 'guest_wifi' label to the
# device_tracker entity in Home Assistant. The phone notification flow and the
# input_text.safelisted_wifi_macs helper remain as a legacy fallback for quick
# MAC-based safelisting. Legacy underscore suffixes such as
# b8_7b_d4_f8_8a_31 are still accepted.
# ============================================================================

# --------------------------------------------------------------------------
# 1. Unknown device detected - notify to assign
# --------------------------------------------------------------------------
- id: guest_device_detected_notification
  alias: "Occupancy - Unknown Device on WiFi"
  description: >
    Sends a detailed notification when a UniFi client arrives on WiFi and is
    not in the household list or guest safelist. Includes UniFi metadata such
    as MAC, IP, SSID, AP MAC, vendor, and the guest flag. Offers actions to
    safelist the device or activate guest mode.
  triggers:
    - trigger: event
      event_type: state_changed
  conditions:
    - condition: template
      value_template: >
        {% set entity_id = trigger.event.data.entity_id
          if trigger.event.data.entity_id is defined else '' %}
        {% set from_state = trigger.event.data.old_state %}
        {% set to_state = trigger.event.data.new_state %}
        {{ entity_id.startswith('device_tracker.unifi_default_')
           and to_state is not none
           and to_state.state == 'home'
           and (from_state is none or from_state.state != 'home') }}
    - condition: template
      value_template: >
        {% set entity_id = trigger.event.data.entity_id %}
        {% set suffix = entity_id | replace('device_tracker.unifi_default_', '') %}
        {% set mac = (trigger.event.data.new_state.attributes.get('mac', '') | lower) %}
        {% set entity_labels = labels(entity_id) %}
        {% set raw = states('input_text.safelisted_wifi_macs') %}
        {% set safelisted = raw.split(',')
          | map('trim')
          | reject('eq', '')
          | map('lower')
          | list if raw not in ['', 'unknown', 'unavailable'] else [] %}
        {{ 'presence' not in entity_labels
           and 'guest_wifi' not in entity_labels
           and suffix not in safelisted
           and mac not in safelisted }}
  actions:
    - variables:
        device_entity_id: "{{ trigger.event.data.entity_id }}"
        device_suffix: >
          {{ device_entity_id | replace('device_tracker.unifi_default_', '') }}
        device_name: >
          {% set device = trigger.event.data.new_state %}
          {% set host_name = device.attributes.get('host_name', '') %}
          {% set fallback = device.name if device is not none else device_entity_id %}
          {{ host_name if host_name else fallback }}
        device_mac: >
          {% set device = trigger.event.data.new_state %}
          {% set mac = device.attributes.get('mac', '') if device is not none else '' %}
          {{ mac | lower if mac else device_suffix | replace('_', ':') }}
        device_ip: "{{ trigger.event.data.new_state.attributes.get('ip', '?') }}"
        device_oui: "{{ trigger.event.data.new_state.attributes.get('oui', '') }}"
        device_essid: "{{ trigger.event.data.new_state.attributes.get('essid', '') }}"
        device_ap_mac: "{{ trigger.event.data.new_state.attributes.get('ap_mac', '') }}"
        device_guest_flag: >
          {{ 'yes' if trigger.event.data.new_state.attributes.get('is_guest', false)
             else 'no' }}
        device_details: >
          {% set ns = namespace(lines=[]) %}
          {% set ns.lines = ns.lines + ['Name: ' ~ device_name] %}
          {% set ns.lines = ns.lines + ['MAC: ' ~ device_mac] %}
          {% set ns.lines = ns.lines + ['IP: ' ~ device_ip] %}
          {% if device_oui %}{% set ns.lines = ns.lines + ['Vendor: ' ~ device_oui] %}{% endif %}
          {% if device_essid %}{% set ns.lines = ns.lines + ['SSID: ' ~ device_essid] %}{% endif %}
          {% if device_ap_mac %}{% set ns.lines = ns.lines + ['AP MAC: ' ~ device_ap_mac] %}{% endif %}
          {% set ns.lines = ns.lines + ['UniFi guest: ' ~ device_guest_flag] %}
          {{ ns.lines | join('\n') }}
    - action: notify.mobile_app_samsung_galaxy_s22_ultra
      data:
        title: "Unknown Device on WiFi"
        message: "{{ device_details }}"
        data:
          actions:
            - action: "SAFELIST_DEVICE_{{ device_suffix }}"
              title: "Safelist as Guest"
            - action: ACTIVATE_GUEST_MODE
              title: "Activate Guest Mode"
            - action: DISMISS_GUEST_ALERT
              title: "Dismiss"
  mode: queued
  max: 10

# --------------------------------------------------------------------------
# 2. Known guest device detected while both residents are away
# --------------------------------------------------------------------------
- id: guest_device_auto_guest_mode
  alias: "Occupancy - Known Guest Arrives While Away"
  description: >
    When a safelisted guest device joins WiFi and both Phil and Steph are away
    from home, automatically activate guest mode and send a notification.
  triggers:
    - trigger: event
      event_type: state_changed
  conditions:
    - condition: template
      value_template: >
        {% set entity_id = trigger.event.data.entity_id
          if trigger.event.data.entity_id is defined else '' %}
        {% set from_state = trigger.event.data.old_state %}
        {% set to_state = trigger.event.data.new_state %}
        {{ entity_id.startswith('device_tracker.unifi_default_')
           and to_state is not none
           and to_state.state == 'home'
           and from_state is not none
           and from_state.state != 'home' }}
    - condition: template
      value_template: >
        {% set entity_id = trigger.event.data.entity_id %}
        {% set suffix = entity_id | replace('device_tracker.unifi_default_', '') %}
        {% set mac = (trigger.event.data.new_state.attributes.get('mac', '') | lower) %}
        {% set entity_labels = labels(entity_id) %}
        {% set raw = states('input_text.safelisted_wifi_macs') %}
        {% set safelisted = raw.split(',')
          | map('trim')
          | reject('eq', '')
          | map('lower')
          | list if raw not in ['', 'unknown', 'unavailable'] else [] %}
        {{ 'guest_wifi' in entity_labels or suffix in safelisted or mac in safelisted }}
    - condition: state
      entity_id: input_boolean.study_occupied
      state: "off"
    - condition: template
      value_template: >
        {{ states('person.phil_patterson') not in ['unknown', 'unavailable']
           and states('person.stephanie_patterson') not in ['unknown', 'unavailable'] }}
    - condition: not
      conditions:
        - condition: state
          entity_id: person.phil_patterson
          state: "home"
    - condition: not
      conditions:
        - condition: state
          entity_id: person.stephanie_patterson
          state: "home"
  actions:
    - variables:
        device_entity_id: "{{ trigger.event.data.entity_id }}"
        device_suffix: >
          {{ device_entity_id | replace('device_tracker.unifi_default_', '') }}
        device_name: >
          {% set device = trigger.event.data.new_state %}
          {% set host_name = device.attributes.get('host_name', '') %}
          {% set fallback = device.name if device is not none else device_entity_id %}
          {{ host_name if host_name else fallback }}
        device_mac: >
          {% set device = trigger.event.data.new_state %}
          {% set mac = device.attributes.get('mac', '') if device is not none else '' %}
          {{ mac | lower if mac else device_suffix | replace('_', ':') }}
        device_ip: "{{ trigger.event.data.new_state.attributes.get('ip', '?') }}"
        device_oui: "{{ trigger.event.data.new_state.attributes.get('oui', '') }}"
        device_essid: "{{ trigger.event.data.new_state.attributes.get('essid', '') }}"
        device_ap_mac: "{{ trigger.event.data.new_state.attributes.get('ap_mac', '') }}"
        guest_details: >
          {% set ns = namespace(lines=[]) %}
          {% set ns.lines = ns.lines + ['Name: ' ~ device_name] %}
          {% set ns.lines = ns.lines + ['MAC: ' ~ device_mac] %}
          {% set ns.lines = ns.lines + ['IP: ' ~ device_ip] %}
          {% if device_oui %}{% set ns.lines = ns.lines + ['Vendor: ' ~ device_oui] %}{% endif %}
          {% if device_essid %}{% set ns.lines = ns.lines + ['SSID: ' ~ device_essid] %}{% endif %}
          {% if device_ap_mac %}{% set ns.lines = ns.lines + ['AP MAC: ' ~ device_ap_mac] %}{% endif %}
          {{ ns.lines | join('\n') }}
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.study_occupied
    - action: notify.mobile_app_samsung_galaxy_s22_ultra
      data:
        title: "Guest Mode Auto-Activated"
        message: >
          Known guest device detected while you're away. Guest schedules are
          now active.

          {{ guest_details }}
  mode: single

# --------------------------------------------------------------------------
# 3. Activate guest mode from notification action
# --------------------------------------------------------------------------
- id: guest_mode_activate_from_notification
  alias: "Occupancy - Activate Guest Mode from Notification"
  description: >
    Turns on guest mode (input_boolean.study_occupied) when the user taps the
    actionable notification button from the guest device detection alert.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: ACTIVATE_GUEST_MODE
  conditions: []
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.study_occupied
    - action: notify.std_information
      data:
        title: "Guest Mode Activated"
        message: "Guest mode is now on. Study and rumpus rooms will follow guest schedules."
  mode: single

# --------------------------------------------------------------------------
# 4. Safelist device from notification action
# --------------------------------------------------------------------------
- id: safelist_wifi_device_from_notification
  alias: "Occupancy - Safelist WiFi Device from Notification"
  description: >
    Adds the detected device MAC(s) to input_text.safelisted_wifi_macs when
    the user taps the "Safelist Device" notification action. The MAC suffixes
    are encoded in the action string (SAFELIST_DEVICE_<mac>[,<mac>...]).
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.action is defined and
           trigger.event.data.action.startswith('SAFELIST_DEVICE_') }}
  actions:
    - variables:
        new_suffixes: "{{ trigger.event.data.action | replace('SAFELIST_DEVICE_', '') }}"
        current: "{{ states('input_text.safelisted_wifi_macs') }}"
        incoming_macs: >
          {% set suffixes = new_suffixes.split(',') | map('trim') | reject('eq', '') | list %}
          {{ suffixes | map('replace', '_', ':') | map('lower') | list }}
        updated: >
          {% set cur = current if current not in ['', 'unknown', 'unavailable'] else '' %}
          {% set existing = cur.split(',') | map('trim') | reject('eq', '') | map('lower') | list %}
          {% set incoming = incoming_macs %}
          {% set merged = existing + (incoming | reject('in', existing) | list) %}
          {{ merged | join(',') }}
    - action: input_text.set_value
      target:
        entity_id: input_text.safelisted_wifi_macs
      data:
        value: "{{ updated }}"
    - action: notify.std_information
      data:
        title: "Device Safelisted"
        message: >
          MAC {{ incoming_macs | join(', ') }} added to safelist. This device
          is now treated as a known guest and will auto-activate guest mode
          when you're both away.
  mode: single
