---
# ============================================================================
# INDOOR THERMAL COMFORT — Helper Scheduling
# ============================================================================
# Keeps clothing insulation (clo) and metabolic rate (met) in sync with the
# time of day and season so the ASHRAE 55 PMV/PPD sensors stay accurate.
#
# Helpers managed:
#   input_number.clothing_insulation — clo (used by all room comfort instances)
#   input_number.metabolic_rate      — met (used by all room comfort instances)
#   input_number.clothing_index_sleeping — dashboard reference for night clo
#
# Bedtime/wake time (master bedroom helpers) define night vs day — no
# dependency on occupancy state. Season affects daytime clo only.
#
# Clothing insulation (clo) reference:
#   Daytime:  0.3 summer | 0.7 autumn/spring | 1.0 winter
#   Sleeping: 1.5 all seasons (doona year-round, capped at integration max)
#
# Metabolic rate (met): always 1.0
#
# Sleeping values tuned so master/kids bedrooms read Neutral (PMV ≈ -0.3)
# at 17-19°C overnight — validated against live ASHRAE 55 sensors.
# ============================================================================

- id: comfort_helpers_schedule
  alias: "Comfort Helpers - Clo & Met Schedule"
  description: >
    Updates clothing insulation and metabolic rate based on bedtime/wake time
    and season for Indoor Thermal Comfort (ASHRAE 55) sensors. Bedtime defines
    the switch to sleeping values; wake time switches back to daytime values.
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wake_time
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
    - trigger: state
      entity_id: input_select.climate_season
      id: season_change
    - trigger: homeassistant
      event: start
      id: ha_start
  conditions: []
  actions:
    - variables:
        season: >
          {{ states('input_select.climate_season') }}
        is_night: >
          {% if trigger.id == 'bed_time' %}true
          {% elif trigger.id == 'wake_time' %}false
          {% else %}
            {% set bed = states('input_datetime.bedtime_master_bedroom') %}
            {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
            {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
          {% endif %}
        clo_day: >
          {% if season == 'summer' %}0.3
          {% elif season == 'winter' %}1.0
          {% else %}0.7{% endif %}
        clo_night: 1.5

    - action: input_number.set_value
      target:
        entity_id: input_number.metabolic_rate
      data:
        value: 1.0

    - action: input_number.set_value
      target:
        entity_id: input_number.clothing_insulation
      data:
        value: "{{ clo_night if is_night else clo_day }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.clothing_index_sleeping
      data:
        value: "{{ clo_night }}"
  mode: restart
