---
# ============================================================================
# INDOOR THERMAL COMFORT — Helper Scheduling
# ============================================================================
# Keeps clothing insulation (clo) and metabolic rate (met) in sync with the
# time of day so the ASHRAE 55 PMV/PPD sensors stay accurate.
#
# Helpers managed:
#   input_number.clothing_insulation      — adult rooms (master, living, study, rumpus)
#   input_number.clothing_insulation_kids — kids room (earlier bedtime than adults)
#   input_number.metabolic_rate           — all rooms (1.0 day / 0.8 sleeping)
#   input_number.clothing_index_sleeping  — dashboard reference for night clo
#
# Two independent schedules:
#   Adult: master bedroom bed/wake times (21:00 / 06:30)
#   Kids:  kids room bed/wake times (18:00 / 06:30)
#
# Clothing insulation (clo) reference:
#   Daytime:  1.1 all seasons (tuned so 21-24°C reads Neutral, 25°C+ Slightly Warm)
#   Sleeping: 1.5 all seasons (doona year-round, capped at integration max)
#
# Metabolic rate (met):
#   Daytime:  1.0 (seated, quiet activity)
#   Sleeping: 0.8 (reclining/sleeping)
#
# Night is defined as bedtime → wakeup (adult schedule for met rate).
#
# Sleeping values tuned so master/kids bedrooms read Neutral (PMV ≈ -0.3)
# at 18.5-22.5°C overnight — validated against live ASHRAE 55 sensors.
#
# NOTE: Time-based logic is used for all decisions (no trigger.id dependency)
# so results are correct regardless of which trigger fires or restarts.
# ============================================================================

- id: comfort_helpers_schedule
  alias: "Comfort Helpers - Clo & Met Schedule"
  description: >
    Updates clothing insulation and metabolic rate based on bedtime/wake time
    for Indoor Thermal Comfort (ASHRAE 55) sensors. Adult rooms follow master
    bedroom schedule; kids room follows its own earlier bedtime.
  triggers:
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
    - trigger: time
      at: input_datetime.wakeup_time_ottos_room
    - trigger: time
      at: input_datetime.bedtime_ottos_room
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - variables:
        clo_day: 1.1
        clo_night: 1.5
        met_day: 1.0
        met_night: 0.8
        adult_is_night: >
          {{ now().strftime('%H:%M:%S') >= states('input_datetime.bedtime_master_bedroom')
             or now().strftime('%H:%M:%S') < states('input_datetime.wakeup_time_master_bedroom') }}
        kids_is_night: >
          {{ now().strftime('%H:%M:%S') >= states('input_datetime.bedtime_ottos_room')
             or now().strftime('%H:%M:%S') < states('input_datetime.wakeup_time_ottos_room') }}

    # Metabolic rate — 0.8 sleeping, 1.0 awake (follows adult schedule)
    - action: input_number.set_value
      target:
        entity_id: input_number.metabolic_rate
      data:
        value: "{{ met_night if adult_is_night | bool else met_day }}"

    # Adult clo (master bedroom, living room, study, rumpus)
    - action: input_number.set_value
      target:
        entity_id: input_number.clothing_insulation
      data:
        value: "{{ clo_night if adult_is_night | bool else clo_day }}"

    # Kids clo (independent schedule — earlier bedtime)
    - action: input_number.set_value
      target:
        entity_id: input_number.clothing_insulation_kids
      data:
        value: "{{ clo_night if kids_is_night | bool else clo_day }}"

    # Dashboard reference
    - action: input_number.set_value
      target:
        entity_id: input_number.clothing_index_sleeping
      data:
        value: "{{ clo_night }}"
  mode: restart
