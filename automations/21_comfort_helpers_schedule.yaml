---
# ============================================================================
# INDOOR THERMAL COMFORT — Helper Scheduling
# ============================================================================
# Keeps clothing insulation (clo) and metabolic rate (met) in sync with the
# time of day and season so the ASHRAE 55 PMV/PPD sensors stay accurate.
#
# Helpers managed:
#   input_number.clothing_insulation — clo (used by all room comfort instances)
#   input_number.metabolic_rate      — met (used by all room comfort instances)
#   input_number.clothing_index_sleeping — dashboard reference for night clo
#
# Triggers:
#   - Occupancy changes (Home ↔ Sleeping)
#   - Season changes
#   - Wake/bed time (master bedroom times used as household reference)
#   - HA restart
#
# Clothing insulation (clo) reference:
#   Daytime:  0.3 summer | 0.7 autumn/spring | 1.0 winter
#   Sleeping: 1.5 all seasons (doona year-round, capped at integration max)
#
# Metabolic rate (met) reference:
#   1.0 sleeping/sedentary | 1.2 morning routine (on occupancy → Home)
#
# Sleeping values tuned so master/kids bedrooms read Neutral (PMV ≈ -0.3)
# at 17-19°C overnight — validated against live ASHRAE 55 sensors.
#
# Night clo activates at bedtime (bed_time trigger) OR when occupancy is
# Sleeping — whichever comes first. This avoids a gap between the configured
# bedtime and the later occupancy transition to Sleeping.
# ============================================================================

- id: comfort_helpers_schedule
  alias: "Comfort Helpers - Clo & Met Schedule"
  description: >
    Updates clothing insulation and metabolic rate based on season, occupancy,
    and time of day so the Indoor Thermal Comfort (ASHRAE 55) sensors reflect
    realistic human factors.
  triggers:
    - trigger: state
      entity_id: input_select.occupancy
      to:
        - Home
        - Sleeping
      id: occupancy_change
    - trigger: state
      entity_id: input_select.climate_season
      id: season_change
    - trigger: time
      at: input_datetime.wakeup_time_master_bedroom
      id: wake_time
    - trigger: time
      at: input_datetime.bedtime_master_bedroom
      id: bed_time
    - trigger: homeassistant
      event: start
      id: ha_start
  conditions: []
  actions:
    - variables:
        is_sleeping: >
          {{ states('input_select.occupancy') == 'Sleeping' }}
        season: >
          {{ states('input_select.climate_season') }}
        # Bedtime trigger or already Sleeping → use night clo.
        # At HA start / season change, check current time vs bedtime.
        use_night_clo: >
          {% if trigger.id == 'bed_time' %}true
          {% elif is_sleeping %}true
          {% elif trigger.id in ['ha_start', 'season_change'] %}
            {% set bed = states('input_datetime.bedtime_master_bedroom') %}
            {% set wake = states('input_datetime.wakeup_time_master_bedroom') %}
            {{ now().strftime('%H:%M:%S') >= bed or now().strftime('%H:%M:%S') < wake }}
          {% else %}false{% endif %}
        clo_day: >
          {% if season == 'summer' %}0.3
          {% elif season == 'winter' %}1.0
          {% else %}0.7{% endif %}
        clo_night: 1.5

    # -----------------------------------------------------------------------
    # Metabolic rate
    # -----------------------------------------------------------------------
    # Sleeping and sedentary are both 1.0. Morning routine (occupancy → Home)
    # bumps to 1.2 briefly, but no delay — the next trigger resets it.
    - choose:
        - conditions:
            - condition: trigger
              id:
                - occupancy_change
            - condition: state
              entity_id: input_select.occupancy
              state: Home
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.metabolic_rate
              data:
                value: 1.2
      default:
        - action: input_number.set_value
          target:
            entity_id: input_number.metabolic_rate
          data:
            value: 1.0

    # -----------------------------------------------------------------------
    # Clothing insulation
    # -----------------------------------------------------------------------
    - action: input_number.set_value
      target:
        entity_id: input_number.clothing_insulation
      data:
        value: "{{ clo_night if use_night_clo else clo_day }}"

    # Also keep the sleeping-specific helper in sync (for reference/dashboard)
    - action: input_number.set_value
      target:
        entity_id: input_number.clothing_index_sleeping
      data:
        value: "{{ clo_night }}"
  mode: restart
