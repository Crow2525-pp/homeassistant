# MORNING PREHEAT  [SUPERSEDED]
# ============================================================================
# This automation has been superseded by the living room wake-up automation
# in 20_time_based_hvac.yaml (living_room_time_based_comfort).
#
# Differences from old approach:
#   - Old: hardcoded 5:30 AM, comfort preset only, no heat/cool decision
#   - New: uses input_datetime.wakeup_time_living_room (configurable in UI),
#          sets comfort preset AND decides heat vs cool based on outside
#          temperature and season
#
# To adjust the living room wake time: Settings → Helpers →
#   Wake-up Time - Living Room  (input_datetime.wakeup_time_living_room)
# ============================================================================
